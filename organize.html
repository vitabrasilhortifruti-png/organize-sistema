  --text:#f1f5f9;--muted:#64748b;--sub:#94a3b8;
}
html,body{height:100%;background:var(--bg);color:var(--text);overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;}
/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;padding:10px 16px;}
.hrow{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px;}
.brand{display:flex;align-items:center;gap:10px;}
#logo-box{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:22px;flex-shrink:0;}
#logo-box img{width:100%;height:100%;object-fit:cover;display:none;}
.brand-name{font-size:15px;font-weight:800;color:var(--text);}
.brand-sub{font-size:10px;color:var(--muted);}
.hright{display:flex;align-items:center;gap:8px;}
#usr-badge{background:rgba(249,115,22,.15);color:var(--accent);padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;}
nav{display:flex;gap:3px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
nav::-webkit-scrollbar{height:0;}
.nb{border:none;background:transparent;color:var(--sub);padding:5px 10px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:'Sora',sans-serif;}
.nb:hover{background:rgba(249,115,22,.1);color:var(--accent);}
.nb.active{background:var(--accent);color:#fff;}
/* MAIN */
main{flex:1;overflow-y:auto;padding:16px;}
main::-webkit-scrollbar{width:6px;}
main::-webkit-scrollbar-track{background:var(--surface);}
main::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px;}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;}
.card+.card{margin-top:16px;}
.section-title{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;margin-bottom:14px;}
/* GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;}
/* INPUTS */
.inp{background:#0d1320;border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 11px;width:100%;font-size:12px;font-family:'Sora',sans-serif;transition:border-color .2s;}
.inp:focus{outline:none;border-color:var(--accent);}
.inp option{background:#0d1320;}
.inp[disabled]{color:var(--muted);cursor:not-allowed;}
label.lbl{font-size:11px;color:var(--sub);display:block;margin-bottom:5px;font-weight:500;}
.frow{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:10px;}
/* BUTTONS */
.btn{border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:'Sora',sans-serif;transition:all .2s;}
.btn-p{background:var(--accent);color:#fff;}.btn-p:hover{background:var(--accent2);transform:translateY(-1px);}
.btn-s{background:transparent;color:var(--sub);border:1px solid var(--border);}.btn-s:hover{border-color:var(--accent);color:var(--accent);}
.btn-g{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3);}
.btn-r{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.btn-sm{padding:5px 9px;font-size:10px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;}
.bo{background:rgba(249,115,22,.2);color:var(--accent);}
.br{background:rgba(239,68,68,.2);color:var(--red);}
.bg{background:rgba(16,185,129,.2);color:var(--green);}
.by{background:rgba(245,158,11,.2);color:var(--yellow);}
/* TABLE */
.tbl{width:100%;font-size:11px;border-collapse:collapse;}
.tbl th{padding:10px;text-align:left;border-bottom:1px solid var(--border);color:var(--accent);font-weight:600;background:rgba(249,115,22,.05);}
.tbl td{padding:9px 10px;border-bottom:1px solid rgba(36,48,80,.5);color:var(--sub);}
.tbl tr:hover td{background:rgba(249,115,22,.03);}
.tbl-wrap{overflow-x:auto;}
/* STAT CARDS */
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;}
.stat-n{font-size:22px;font-weight:800;color:var(--text);}
.stat-l{font-size:10px;color:var(--muted);margin-top:3px;}
.stat-icon{font-size:12px;color:var(--accent);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--accent);border-radius:10px;padding:10px 16px;font-size:12px;color:var(--text);z-index:99999;animation:slideIn .3s ease;max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.5);}
@keyframes slideIn{from{transform:translateX(110%);opacity:0;}to{transform:translateX(0);opacity:1;}}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:50000;padding:20px;overflow-y:auto;}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:650px;width:100%;margin:auto;max-height:90vh;overflow-y:auto;}
/* CHECKBOX GROUP */
.chk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:7px;}
.chk-lbl{display:flex;align-items:center;gap:7px;cursor:pointer;padding:7px 10px;background:#0d1320;border:1px solid var(--border);border-radius:7px;font-size:11px;color:var(--sub);transition:all .2s;}
.chk-lbl input[type=checkbox]{accent-color:var(--accent);width:13px;height:13px;}
.chk-lbl:has(input:checked){border-color:var(--accent);color:var(--accent);background:rgba(249,115,22,.08);}
/* TABS */
.tabs{display:flex;gap:3px;margin-bottom:14px;}
.tab{border:none;background:transparent;color:var(--sub);padding:6px 12px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;transition:all .2s;}
.tab.active{background:var(--accent);color:#fff;}
/* RADIO GROUP */
.radio-row{display:flex;gap:8px;flex-wrap:wrap;}
.radio-lbl{display:flex;align-items:center;gap:6px;cursor:pointer;padding:7px 12px;background:#0d1320;border:1px solid var(--border);border-radius:7px;font-size:11px;color:var(--sub);}
.radio-lbl input{accent-color:var(--accent);}
/* LOTE CHECKBOX */
.lote-chk-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;max-height:220px;overflow-y:auto;padding:4px;}
.lote-chk-lbl{display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px;background:#0d1320;border:1px solid var(--border);border-radius:8px;transition:all .2s;}
.lote-chk-lbl input{accent-color:var(--accent);width:14px;height:14px;}
.lote-chk-lbl:has(input:checked){border-color:var(--accent);background:rgba(249,115,22,.07);}
/* PROGRESS BAR */
.pbar{background:rgba(36,48,80,.5);border-radius:4px;height:6px;overflow:hidden;}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .3s;}
/* PALETE BOX */
.palete-box{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);border-radius:8px;padding:10px;font-size:12px;font-weight:600;color:var(--accent);margin:8px 0;}
/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:12px;}
/* ALERT BOX */
.alert-r{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px;color:var(--red);font-size:12px;}
.alert-g{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:8px;padding:12px;color:var(--green);font-size:12px;}
.alert-o{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);border-radius:8px;padding:12px;color:var(--accent);font-size:12px;}
/* RESPONSIVE */
@media(max-width:640px){.grid2,.grid3{grid-template-columns:1fr;}.hrow{flex-wrap:wrap;}}
/* PRINT */
@media print{header,nav,.no-print{display:none!important;}body{background:white;color:black;}main{overflow:visible;padding:0;}}
/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999999;padding:20px;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:36px 32px;max-width:460px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.6);}
.login-logo{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;}
.login-title{text-align:center;font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px;}
.login-sub{text-align:center;font-size:12px;color:var(--muted);margin-bottom:28px;}
.login-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);border-radius:8px;padding:10px;font-size:12px;color:var(--red);margin-bottom:14px;display:none;}
/* BADGE ACESSO */
.badge-admin{background:rgba(249,115,22,.2);color:var(--accent);}
.badge-gerente{background:rgba(99,102,241,.2);color:#818cf8;}
.badge-operador{background:rgba(16,185,129,.2);color:var(--green);}
.badge-visualizador{background:rgba(100,116,139,.2);color:var(--sub);}

</style>
</head>

<script>
// ═══════════════════════════════════════════════════════
// CONFIGURAÇÃO — altere para o endereço do seu servidor
// ═══════════════════════════════════════════════════════
const API = window.location.origin; // mesmo servidor que serve o HTML
// Se rodar em servidor diferente: const API = 'http://SEU-IP:3000';

// ═══════════════════════════════════════════════════════
// CAMADA DE API
// ═══════════════════════════════════════════════════════
let TOKEN = localStorage.getItem('org_token') || '';
let CURRENT_USER = null;
let DB = {}; // cache local dos dados

async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'x-token': TOKEN },
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(API + path, opts);
    if (res.status === 401) { logout(); return null; }
    const data = await res.json();
    if (!res.ok) { toast(data.erro || 'Erro na operação', 'err'); return null; }
    return data;
  } catch(e) {
    setOffline();
    toast('Sem conexão com o servidor', 'err');
    return null;
  }
}

const GET  = (p)    => api('GET',    p);
const POST = (p, b) => api('POST',   p, b);
const PUT  = (p, b) => api('PUT',    p, b);
const DEL  = (p)    => api('DELETE', p);
const PATCH= (p, b) => api('PATCH',  p, b);

function setOffline() {
  const el = document.getElementById('conn-status');
  if (el) { el.textContent = '● offline'; el.style.background = 'rgba(239,68,68,.2)'; el.style.color = 'var(--red)'; }
}
function setOnline() {
  const el = document.getElementById('conn-status');
  if (el) { el.textContent = '● online'; el.style.background = 'rgba(16,185,129,.2)'; el.style.color = 'var(--green)'; }
}

// ═══════════════════════════════════════════════════════
// CARREGAR TODOS OS DADOS DO SERVIDOR
// ═══════════════════════════════════════════════════════
async function loadAllData() {
  const [empresa, produtos, fornecedores, clientes, entradas, pedidos,
         romaneios, vendas, retornos_caixa, saidas_caixa, pagamentos, descartes] =
    await Promise.all([
      GET('/api/empresa'),
      GET('/api/produtos'),
      GET('/api/fornecedores'),
      GET('/api/clientes'),
      GET('/api/entradas'),
      GET('/api/pedidos'),
      GET('/api/romaneios'),
      GET('/api/vendas'),
      GET('/api/retornos_caixa'),
      GET('/api/saidas_caixa'),
      GET('/api/pagamentos'),
      GET('/api/descartes'),
    ]);

  DB = {
    empresa:       empresa || {nome:'Organize',cnpj:'',telefone:'',email:'',endereco:'',logo:''},
    produtos:      produtos || [],
    fornecedores:  fornecedores || [],
    clientes:      clientes || [],
    entradas:      entradas || [],
    pedidos:       pedidos || [],
    romaneios:     romaneios || [],
    vendas:        vendas || [],
    retornos_caixa: retornos_caixa || [],
    saidas_caixa:  saidas_caixa || [],
    pagamentos:    pagamentos || [],
    descartes:     descartes || [],
    usuarios:      [],
  };

  if (CURRENT_USER && CURRENT_USER.acesso === 'admin') {
    DB.usuarios = await GET('/api/usuarios') || [];
  }

  setOnline();
  syncHeader();
}

// ═══════════════════════════════════════════════════════
// UTILITÁRIOS
// ═══════════════════════════════════════════════════════
function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }
function today() { return new Date().toISOString().split('T')[0]; }
function tomorrow() { const d=new Date(); d.setDate(d.getDate()+1); return d.toISOString().split('T')[0]; }
function fmtDate(d) { if(!d) return '-'; try{return new Date(d+'T12:00:00').toLocaleDateString('pt-BR');}catch{return d;} }
function calcPaletes(qtd,unid=30) { const c=Math.floor(qtd/unid),r=qtd%unid; return{completos:c,resto:r,total:c+(r>0?1:0)}; }
function fmtMoney(v) { return 'R$ '+(v||0).toFixed(2).replace('.',','); }
function canEdit() { return CURRENT_USER && ['admin','gerente','operador'].includes(CURRENT_USER.acesso); }
function isAdmin() { return CURRENT_USER && CURRENT_USER.acesso === 'admin'; }

function toast(msg, type='ok') {
  const t=document.createElement('div');
  t.className='toast';
  t.style.borderColor=type==='err'?'var(--red)':type==='warn'?'var(--yellow)':'var(--accent)';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3500);
}

function modal(html) {
  const bg=document.createElement('div');
  bg.className='modal-bg';
  bg.innerHTML=`<div class="modal-box">${html}</div>`;
  bg.addEventListener('click',e=>{if(e.target===bg) bg.remove();});
  document.body.appendChild(bg);
  lucide.createIcons();
  return bg;
}
function closeModal() { var _mb=document.querySelector('.modal-bg'); if(_mb) _mb.remove(); }

function syncHeader() {
  const e = DB.empresa || {};
  document.getElementById('emp-nome-header').textContent = e.nome || 'Organize';
}

// ═══════════════════════════════════════════════════════
// LOGIN / LOGOUT
// ═══════════════════════════════════════════════════════
function togglePass() {
  const p = document.getElementById('login-pass');
  p.type = p.type === 'password' ? 'text' : 'password';
}

async function loginSubmit() {
  const email = document.getElementById('login-user').value.trim();
  const senha = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  const btn = document.getElementById('btn-entrar');
  const loading = document.getElementById('login-loading');
  err.style.display = 'none';
  if (!email || !senha) { err.textContent='Preencha e-mail e senha.'; err.style.display='block'; return; }

  btn.disabled = true;
  loading.style.display = 'block';

  const res = await fetch(API + '/api/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({email, senha})
  }).catch(() => null);

  btn.disabled = false;
  loading.style.display = 'none';

  if (!res || !res.ok) {
    err.textContent = 'E-mail ou senha incorretos.';
    err.style.display = 'block';
    return;
  }

  const data = await res.json();
  TOKEN = data.token;
  CURRENT_USER = data.usuario;
  localStorage.setItem('org_token', TOKEN);

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('usr-badge').textContent =
    CURRENT_USER.acesso==='admin'?'👑 ADMIN':
    CURRENT_USER.acesso==='gerente'?'⭐ GERENTE':
    CURRENT_USER.acesso==='operador'?'🔧 OPERADOR':'👁 VISUALIZADOR';
  document.getElementById('usr-nome').textContent = CURRENT_USER.nome || CURRENT_USER.email;

  await loadAllData();
  if (CURRENT_USER && CURRENT_USER.acesso === 'visualizador') {
    goTo('entrada');
  } else {
    goTo('dashboard');
  }
}

async function logout() {
  await fetch(API + '/api/logout', {method:'POST', headers:{'x-token':TOKEN}}).catch(()=>{});
  TOKEN = '';
  CURRENT_USER = null;
  DB = {};
  localStorage.removeItem('org_token');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-err').style.display = 'none';
}

// ═══════════════════════════════════════════════════════
// PRIMEIRO ACESSO
// ═══════════════════════════════════════════════════════
function mostrarPrimeiroAcesso() {
  document.getElementById('login-form-area').style.display = 'none';
  document.getElementById('primeiro-acesso-area').style.display = 'block';
}

async function criarPrimeiroUsuario() {
  const nome  = document.getElementById('pa-nome').value.trim();
  const email = document.getElementById('pa-email').value.trim();
  const senha = document.getElementById('pa-senha').value;
  const conf  = document.getElementById('pa-conf').value;
  const err   = document.getElementById('pa-err');
  err.style.display = 'none';

  if (!nome||!email||!senha) { err.textContent='Preencha todos os campos.'; err.style.display='block'; return; }
  if (senha.length < 6) { err.textContent='Senha: mínimo 6 caracteres.'; err.style.display='block'; return; }
  if (senha !== conf) { err.textContent='Senhas não coincidem.'; err.style.display='block'; return; }

  const res = await POST('/api/usuarios', {nome, email, senha, acesso:'admin'});
  if (!res) return;

  // Auto login
  document.getElementById('login-user').value = email;
  document.getElementById('login-pass').value = senha;
  document.getElementById('login-form-area').style.display = 'block';
  document.getElementById('primeiro-acesso-area').style.display = 'none';
  await loginSubmit();
}

// ═══════════════════════════════════════════════════════
// NAVEGAÇÃO
// ═══════════════════════════════════════════════════════
let currentPage = 'dashboard';
function goTo(page) {
  // Visualizador can only see entrada and estoque
  if (CURRENT_USER && CURRENT_USER.acesso === 'visualizador') {
    if (page !== 'entrada' && page !== 'estoque') {
      page = 'entrada';
    }
  }
  currentPage = page;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  const btns = document.querySelectorAll('.nb');
  const map = {dashboard:0,empresa:1,produtos:2,cadastros:3,entrada:4,pedidos:5,romaneio:6,vendas:7,caixas:8,estoque:9,financeiro:10,relatorios:11};
  if (map[page] !== undefined) if(btns[map[page]]) btns[map[page]].classList.add('active');
  const renders = {
    dashboard:renderDashboard, empresa:renderEmpresa, produtos:renderProdutos,
    cadastros:renderCadastros, entrada:renderEntrada, pedidos:renderPedidos,

    estoque:renderEstoque, financeiro:renderFinanceiro, relatorios:renderRelatorios
  };
  if (renders[page]) renders[page]();
  lucide.createIcons();
}

// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════
// ESTOQUE HELPERS
// ═══════════════════════════════════════════════════════
function getLotesDisponiveis(fruta) {
  return DB.entradas.filter(e => e.fruta===fruta && (e.quantidade_atual??e.quantidade)>0 && e.status!=='esgotado');
}
async function abaterLote(lote_id, unidades) {
  var e = DB.entradas.find(function(x){return x.id===lote_id;});
  if (!e) return;
  var pesoUn = e.peso_unitario || 1;
  await abaterLoteKg(lote_id, unidades, pesoUn);
}

async function abaterLoteKg(lote_id, unidades, pesoUnitario) {
  var e = DB.entradas.find(function(x){return x.id===lote_id;});
  if (!e) return;
  var saldoAtual = e.quantidade_atual != null ? e.quantidade_atual : e.quantidade;
  // Abate in units (caixas/sacos)
  e.quantidade_atual = Math.max(0, saldoAtual - unidades);
  var status = e.quantidade_atual === 0 ? 'esgotado' : 'disponivel';
  e.status = status;
  // KG abatido = qtd × peso unitário do PEDIDO (não do lote)
  var kgAbatido = unidades * (pesoUnitario || e.peso_unitario || 1);
  await PATCH('/api/entradas/'+lote_id+'/saldo', {
    quantidade_atual: e.quantidade_atual,
    status: status,
    kg_abatido: kgAbatido
  });
}
async function restaurarLote(lote_id, unidades) {
  var e = DB.entradas.find(function(x){return x.id===lote_id;});
  if (!e) return;
  var saldoAtual = e.quantidade_atual != null ? e.quantidade_atual : e.quantidade;
  e.quantidade_atual = saldoAtual + unidades;
  e.status = 'disponivel';
  await PATCH('/api/entradas/'+lote_id+'/saldo', {
    quantidade_atual: e.quantidade_atual,
    status: 'disponivel'
  });
}
async function restaurarLote(lote_id, unidades) {
  const e = DB.entradas.find(e=>e.id===lote_id);
  if (!e) return;
  e.quantidade_atual = (e.quantidade_atual??e.quantidade) + unidades;
  e.status = 'disponivel';
  await PATCH(`/api/entradas/${lote_id}/saldo`, {quantidade_atual: e.quantidade_atual, status:'disponivel'});
}

// ═══════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════
function renderDashboard() {
  var content = document.getElementById('content');
  var totalPedidos = DB.pedidos.length;
  var pedPendentes = DB.pedidos.filter(function(p){return p.status==='Pendente';}).length;
  var totalVendas = DB.vendas.reduce(function(s,v){return s+(v.valor||0);},0);
  var kgEstoque = DB.entradas.reduce(function(s,e){var q=e.quantidade_atual!=null?e.quantidade_atual:e.quantidade; return s+q*(e.peso_unitario||1);},0);
  var totalRecebido = DB.pagamentos.reduce(function(s,p){return s+(p.valor||0);},0);
  var totalPedVal = DB.pedidos.reduce(function(s,p){return s+(p.valor||0)*p.quantidade;},0);
  var aReceber = totalPedVal - totalRecebido;

  // Vendas por dia - ultimos 7 dias
  var hoje = new Date();
  var dias7 = [];
  for(var i=6; i>=0; i--) {
    var d = new Date(hoje); d.setDate(d.getDate()-i);
    var ds = d.toISOString().split('T')[0];
    var label = d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit'});
    var vDia = DB.vendas.filter(function(v){return v.data===ds;}).reduce(function(s,v){return s+(v.valor||0);},0);
    dias7.push({ds:ds,label:label,vendas:vDia});
  }
  var maxV = Math.max.apply(null,dias7.map(function(d){return d.vendas;}))||1;

  // Top clientes
  var cliMap = {};
  DB.pedidos.forEach(function(p){if(!cliMap[p.cliente_nome])cliMap[p.cliente_nome]=0;cliMap[p.cliente_nome]+=(p.valor||0)*p.quantidade;});
  var topCli = Object.keys(cliMap).map(function(k){return{nome:k,total:cliMap[k]};}).sort(function(a,b){return b.total-a.total;}).slice(0,5);
  var maxCli = topCli.length?topCli[0].total:1;

  // Top frutas
  var frutaMap = {};
  DB.pedidos.forEach(function(p){if(!frutaMap[p.fruta])frutaMap[p.fruta]=0;frutaMap[p.fruta]+=(p.quantidade_kg||0);});
  var topFrutas = Object.keys(frutaMap).map(function(k){return{nome:k,kg:frutaMap[k]};}).sort(function(a,b){return b.kg-a.kg;}).slice(0,5);
  var maxFruta = topFrutas.length?topFrutas[0].kg:1;

  // Estoque por fruta
  var estMap = {};
  DB.entradas.forEach(function(e){var s=e.quantidade_atual!=null?e.quantidade_atual:e.quantidade;if(s>0){if(!estMap[e.fruta])estMap[e.fruta]={qtd:0,kg:0};estMap[e.fruta].qtd+=s;estMap[e.fruta].kg+=s*(e.peso_unitario||1);}});

  var cores = ['var(--accent)','#f59e0b','#10b981','#6366f1','#ec4899'];
  var todayStr = today();

  // Pedidos pendentes
  var pedsPend = DB.pedidos.filter(function(p){return p.status==='Pendente';});
  var pendHTML = '';
  if(pedsPend.length>0) {
    var rows = pedsPend.slice(0,5).map(function(p){
      var atrasado = p.data_entrega < todayStr;
      return '<tr>'
        +'<td><strong style="color:var(--text)">'+p.cliente_nome+'</strong></td>'
        +'<td>'+p.fruta+'</td><td>'+p.quantidade+'</td>'
        +'<td style="color:'+(atrasado?'var(--red)':'var(--text)')+';">'+(atrasado?'⚠️ ':'')+fmtDate(p.data_entrega)+'</td>'
        +'<td><button class="btn btn-g btn-sm" data-pid="'+p.id+'" onclick="modalAtenderPedido(this.dataset.pid)">✓ Atender</button></td>'
        +'</tr>';
    }).join('');
    pendHTML = '<div class="card" style="margin-bottom:16px;border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.05);">'
      +'<div class="section-title" style="color:var(--yellow);">⚠️ Pedidos Pendentes ('+pedsPend.length+')</div>'
      +'<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Cliente</th><th>Fruta</th><th>Qtd (cx)</th><th>Peso (kg)</th><th>Entrega</th><th>Ação</th></tr></thead><tbody>'
      +rows+'</tbody></table></div></div>';
  }

  // Grafico barras vendas
  var barras = dias7.map(function(d){
    var h = d.vendas>0 ? Math.max(6,Math.round((d.vendas/maxV)*100)) : 4;
    var cor = d.vendas>0?'var(--accent)':'var(--border)';
    var vlabel = d.vendas>0?'R$'+d.vendas.toFixed(0):'';
    return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;">'
      +'<div style="font-size:8px;color:var(--sub);white-space:nowrap;">'+vlabel+'</div>'
      +'<div style="width:100%;background:'+cor+';border-radius:4px 4px 0 0;height:'+h+'px;"></div>'
      +'<div style="font-size:9px;color:var(--muted);text-align:center;">'+d.label+'</div>'
      +'</div>';
  }).join('');

  // Top clientes bars
  var cliHTML = topCli.length===0
    ? '<div class="empty">Nenhum pedido</div>'
    : topCli.map(function(c,i){
        var pct = Math.round((c.total/maxCli)*100);
        return '<div style="margin-bottom:8px;">'
          +'<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px;">'
          +'<span style="color:var(--text);font-weight:600;">'+(i+1)+'. '+c.nome+'</span>'
          +'<span style="color:'+cores[i]+';">'+fmtMoney(c.total)+'</span></div>'
          +'<div class="pbar"><div class="pbar-fill" style="width:'+pct+'%;background:'+cores[i]+';"></div></div>'
          +'</div>';
      }).join('');

  // Top frutas bars
  var frutaHTML = topFrutas.length===0
    ? '<div class="empty">Nenhum pedido</div>'
    : topFrutas.map(function(f,i){
        var pct = Math.round((f.kg/maxFruta)*100);
        return '<div style="margin-bottom:8px;">'
          +'<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px;">'
          +'<span style="color:var(--text);font-weight:600;">'+(i+1)+'. '+f.nome+'</span>'
          +'<span style="color:'+cores[i]+';">'+f.kg.toFixed(0)+' kg</span></div>'
          +'<div class="pbar"><div class="pbar-fill" style="width:'+pct+'%;background:'+cores[i]+';"></div></div>'
          +'</div>';
      }).join('');

  // Estoque HTML
  var estFrutas = Object.keys(estMap);
  var estHTML = estFrutas.length===0
    ? '<div class="empty">Estoque zerado</div>'
    : estFrutas.map(function(f){
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);">'
          +'<span style="font-size:12px;font-weight:600;color:var(--text);">'+f+'</span>'
          +'<div style="display:flex;gap:10px;font-size:11px;">'
          +'<span style="color:var(--sub);">'+estMap[f].qtd+' un</span>'
          +'<span style="color:var(--accent);font-weight:700;">'+estMap[f].kg.toFixed(0)+' kg</span>'

    ${PRODUTOS_PRESET.map(p=>{const jaExiste=prods.find(x=>x.codigo===p.codigo);
    return `<tr><td>${p.codigo}</td><td>${p.nome}</td><td>${p.tipo}</td><td>${p.peso} kg</td>
    <td>${jaExiste?'<span class="badge bg">✓ Adicionado</span>':`<button class="btn btn-p btn-sm" onclick="addPreset('${p.codigo}')"><i data-lucide="plus" style="width:11px;height:11px;"></i> Usar</button>`}</td></tr>`;}).join('')}

async function addProduto() {
  const cod=document.getElementById('p-cod').value.trim(), nome=document.getElementById('p-nome').value.trim();
  const tipo=document.getElementById('p-tipo').value, peso=parseFloat(document.getElementById('p-peso').value)||0;
  if(!cod||!nome||!tipo||!peso) return toast('Preencha todos os campos','err');
  const res = await POST('/api/produtos', {id:uid(),codigo:cod,nome,tipo,peso});
  if(res) { DB.produtos.push(res); toast('✓ Produto adicionado'); renderProdutos(); }
}
async function addPreset(cod) {
  const p=PRODUTOS_PRESET.find(x=>x.codigo===cod);
  if(!p) return;
  if(DB.produtos.find(x=>x.codigo===cod)) return toast('Produto já adicionado','warn');
  const res = await POST('/api/produtos', {id:uid(),...p});
  if(res) { DB.produtos.push(res); toast('✓ Produto adicionado'); renderProdutos(); }
}
async function delProduto(id) {
  if(!await DEL(`/api/produtos/${id}`)) return;
  DB.produtos = DB.produtos.filter(p=>p.id!==id); toast('Removido'); renderProdutos();
}

async function delUsuario(id) {
  var u = DB.usuarios.find(function(x){return x.id===id;});
  if(!u) return;
  if(u.email.toLowerCase() === 'nildomoraesagro@gmail.com') {
    return toast('⚠️ Este usuário não pode ser excluído.', 'err');

  if(!confirm('Excluir usuário "'+u.nome+'" ('+u.email+')? Esta ação não pode ser desfeita.')) return;

  toast('✅ Usuário '+u.nome+' excluído!');
  renderCadastros(); switchCadastro('usuarios');
}

          <button class="btn btn-s btn-sm" onclick="abrirDetalheEntrada('${e.id}')" title="Detalhes">🔍</button>

function updateEntTipo() {
  const t=document.querySelector('input[name="en-tipo"]:checked').value;
  document.getElementById('en-peso-wrap').style.display=t==='kg'?'none':'block';
  calcEntKg();
}
function calcEntKg() {
  const t=document.querySelector('input[name="en-tipo"]:checked').value;
  const q=parseFloat(document.getElementById('en-qtd').value)||0;
  const p=parseFloat(document.getElementById('en-peso').value)||1;
  document.getElementById('en-total-kg').value=(t==='kg'?q:q*p).toFixed(2);
}
async function addEntrada() {
  let lote=document.getElementById('en-lote').value.trim()||('LT-'+Date.now().toString(36).toUpperCase());
  const frutaSel=document.getElementById('en-fruta').value;
  const fruta=frutaSel==='__nova'?document.getElementById('en-fruta-nova').value.trim():frutaSel;
  const fornId=document.getElementById('en-forn').value;
  const tipo=document.querySelector('input[name="en-tipo"]:checked').value;
  const qtd=parseFloat(document.getElementById('en-qtd').value)||0;
  const peso=parseFloat(document.getElementById('en-peso').value)||1;
  const data=document.getElementById('en-data').value;
  const obs=document.getElementById('en-obs').value;
  if(!fruta||!qtd||!data) return toast('Preencha fruta, quantidade e data','err');
  const totalKg=tipo==='kg'?qtd:qtd*peso;
  const payload={id:uid(),lote,fruta,fornecedor_id:fornId,tipo,quantidade:qtd,quantidade_atual:qtd,peso_unitario:tipo==='kg'?1:peso,total_kg:totalKg,data,obs,status:'disponivel'};
  const res=await POST('/api/entradas',payload);
  if(res){ DB.entradas.unshift(res); toast(`✓ Entrada: ${lote} | ${totalKg.toFixed(1)} kg`); renderEntrada(); }
}
async function delEntrada(id) {
  if(!await DEL(`/api/entradas/${id}`)) return;
  DB.entradas=DB.entradas.filter(e=>e.id!==id); toast('Entrada removida'); renderEntrada();
}

// ── FILTROS PEDIDOS ──────────────────────────────────────
function getPedidosFiltrados() {
  var ini = (document.getElementById('ped-f-ini')||{}).value || '';
  var fim = (document.getElementById('ped-f-fim')||{}).value || '';
  var ent = (document.getElementById('ped-f-ent')||{}).value || '';
  var status = (document.getElementById('ped-f-status')||{}).value || '';
  return DB.pedidos.filter(function(p) {
    if(ini && p.data_pedido < ini) return false;
    if(fim && p.data_pedido > fim) return false;
    if(ent && p.data_entrega !== ent) return false;
    if(status && p.status !== status) return false;
    return true;
  });
}

function limparFiltrosPedidos() {
  ['ped-f-ini','ped-f-fim','ped-f-ent','ped-f-status'].forEach(function(id) {
    var el = document.getElementById(id);
    if(el) el.value = '';
  });
  filtrarPedidos();
}

function filtrarPedidos() {
  var peds = getPedidosFiltrados();
  var tbody = document.getElementById('ped-tbody');
  if(!tbody) return;
  if(peds.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">Nenhum pedido encontrado</td></tr>';
    return;
  }
  tbody.innerHTML = peds.map(function(p) {
    return '<tr>'
      +'<td style="color:var(--text);font-weight:600">'+p.cliente_nome+'</td>'
      +'<td>'+p.fruta+'</td>'
      +'<td>'+p.quantidade+' cx</td>'
      +'<td><strong style="color:var(--accent)">'+(p.quantidade_kg||0).toFixed(0)+' kg</strong></td>'
      +'<td>'+fmtMoney((p.valor||0)*p.quantidade)+'</td>'
      +'<td>'+fmtDate(p.data_entrega)+'</td>'
      +'<td><span class="badge '+(p.status==='Atendido'?'bg':p.status==='Pendente'?'by':'bo')+'">'+p.status+'</span></td>'
      +'<td style="display:flex;gap:4px;flex-wrap:wrap;">'
      +(p.status==='Pendente'?'<button class="btn btn-g btn-sm" data-pid="'+p.id+'" onclick="modalAtenderPedido(this.dataset.pid)">✓ Atender</button>':'')
      +'<button class="btn btn-s btn-sm" data-pid="'+p.id+'" onclick="modalEditarPedido(this.dataset.pid)" title="Editar">✏️</button>'
      +'<button class="btn btn-s btn-sm" data-pid="'+p.id+'" onclick="imprimirPedido(this.dataset.pid)" title="Imprimir">🖨️</button>'
      +'<button class="btn btn-r btn-sm" data-pid="'+p.id+'" onclick="delPedido(this.dataset.pid)"><i data-lucide="trash-2" style="width:11px;height:11px;"></i></button>'
      +'</td></tr>';
  }).join('');
  lucide.createIcons();
}

  var peds = getPedidosFiltrados();

function atualizarLotesPed() {
  const fruta=document.getElementById('ped-fruta').value;
  const mercEl=document.getElementById('ped-merc');
  const peso=parseFloat(mercEl.options[mercEl.selectedIndex] && mercEl.options[mercEl.selectedIndex].dataset ? mercEl.options[mercEl.selectedIndex].dataset.peso : null)||20;
  const qtd=parseInt(document.getElementById('ped-qtd').value)||0;
  const container=document.getElementById('lotes-ped');
  if(!fruta){ container.innerHTML='<div class="empty">Selecione a fruta</div>'; return; }
  const lotes=getLotesDisponiveis(fruta);
  if(lotes.length===0){ container.innerHTML='<div style="color:var(--red);font-size:12px;padding:10px;">❌ Sem estoque.</div>'; return; }
  container.innerHTML=lotes.map(l=>{
    const saldo=l.quantidade_atual??l.quantidade;
    return`<label class="lote-chk-lbl"><input type="checkbox" class="lote-cb" value="${l.id}" data-lote="${l.lote}" data-saldo="${saldo}" data-peso="${l.peso_unitario||1}" onchange="updateLoteInfo()">
    <div><div style="font-size:11px;font-weight:700;color:var(--text)">${l.lote}</div><div style="font-size:10px;color:var(--sub)">${saldo} unid.</div></div></label>`;
  }).join('');
  if(qtd>0&&mercEl.value) document.getElementById('lotes-ped-info').innerHTML=`<span style="color:var(--accent)">Necessário: ${qtd} × ${peso}kg = <strong>${(qtd*peso).toFixed(1)} kg</strong></span>`;
}
function updateLoteInfo() {
  const cbs=document.querySelectorAll('.lote-cb:checked');
  const lotes=Array.from(cbs).map(c=>c.dataset.lote).join(', ');
  const kgTotal=Array.from(cbs).reduce((s,c)=>s+parseFloat(c.dataset.saldo)*parseFloat(c.dataset.peso),0);
  document.getElementById('lotes-ped-info').innerHTML=cbs.length>0?`<span style="color:var(--green)">✓ ${lotes} | ${kgTotal.toFixed(1)} kg</span>`:'Nenhum selecionado';
}
async function addPedido() {

function autoFillQtdLote(cb) {
  if(cb.checked) {
    var qtdEl = document.querySelector('.lat-qtd[data-id="'+cb.value+'"]');
    if(qtdEl) {
      var p = DB.pedidos.find(function(x){return x.id===window._atenderPedidoId;});
      if(p) {
        var jaAlocado = 0;
        document.querySelectorAll('.lat-cb:checked').forEach(function(otherCb) {
          if(otherCb.value !== cb.value) {
            var oEl = document.querySelector('.lat-qtd[data-id="'+otherCb.value+'"]');
            jaAlocado += parseInt(oEl ? oEl.value : 0) || 0;
          }
        });
        var restante = Math.max(0, p.quantidade - jaAlocado);
        var saldo = parseInt(cb.dataset.saldo) || 0;
        qtdEl.value = Math.min(restante, saldo);
      }
    }
  } else {
    var qtdEl = document.querySelector('.lat-qtd[data-id="'+cb.value+'"]');
    if(qtdEl) qtdEl.value = '';
  }
  atualizarResumoAtender();
}

function atualizarResumoAtender() {
  var peso = window._pesoAtenderAtual || 1;
  var cbs = document.querySelectorAll('.lat-cb:checked');
  var totalCx = 0, totalKg = 0;
  var resumo = [];
  // Update per-lote kg display
  document.querySelectorAll('.lat-qtd').forEach(function(qtdEl) {
    var qtd = parseInt(qtdEl.value)||0;
    var kgShow = document.querySelector('.lat-kg-show[data-id="'+qtdEl.dataset.id+'"]');
    if(kgShow) kgShow.textContent = qtd > 0 ? (qtd*peso).toFixed(0)+' kg' : '— kg';
  });
  cbs.forEach(function(cb) {
    var qtdEl = document.querySelector('.lat-qtd[data-id="'+cb.value+'"]');
    var qtd = parseInt(qtdEl ? qtdEl.value : 0)||0;
    if(qtd > 0) {
      var kg = qtd * peso;
      totalCx += qtd; totalKg += kg;
      resumo.push('<strong>'+cb.dataset.lote+'</strong>: '+qtd+' cx = '+kg.toFixed(0)+' kg');
    }
  });
  var el = document.getElementById('lat-resumo');
  if(!el) return;
  if(resumo.length > 0) {
    el.innerHTML = '<span style="color:var(--green)">✓ '+resumo.join('  +  ')+'</span>'
      +'<div style="margin-top:6px;font-size:13px;font-weight:800;color:var(--accent)">Total: '+totalCx+' cx × '+peso+'kg = <span style="color:var(--green)">'+totalKg.toFixed(0)+' kg</span></div>';
  } else {
    el.innerHTML = '☝️ Selecione um lote acima';
  }
}

async function confirmarAtenderPedido(id) {
  var p = DB.pedidos.find(function(x){return x.id===id;});
  if(!p) return;
  var cbs = document.querySelectorAll('.lat-cb:checked');
  if(cbs.length===0) return toast('Selecione ao menos um lote','err');

  // ── PESO UNITÁRIO: usa o valor já calculado no modal ──
  var pesoPorCaixa = window._pesoAtenderAtual || 1;
  // Double-check from produto
  var prod = DB.produtos.find(function(x){return x.id===p.mercadoria_id;});
  if(prod && parseFloat(prod.peso) > 0) pesoPorCaixa = parseFloat(prod.peso);

  var lotesUsados = [];
  for(var i=0; i<cbs.length; i++) {
    var cb = cbs[i];
    var qtdEl = document.querySelector('.lat-qtd[data-id="'+cb.value+'"]');
    var qtd = parseInt(qtdEl ? qtdEl.value : 0)||0;
    if(qtd<=0) return toast('Informe a quantidade do lote '+cb.dataset.lote,'err');
    if(qtd > parseFloat(cb.dataset.saldo)) return toast('Quantidade maior que saldo do lote '+cb.dataset.lote,'err');
    var kgAbatido = qtd * pesoPorCaixa;
    await abaterLoteKg(cb.value, qtd, pesoPorCaixa);
    lotesUsados.push(cb.dataset.lote+'('+qtd+'cx/'+kgAbatido.toFixed(0)+'kg)');
  }

  var kgTotal = 0;
  cbs.forEach(function(cb) {
    var qtdEl = document.querySelector('.lat-qtd[data-id="'+cb.value+'"]');
    kgTotal += (parseInt(qtdEl ? qtdEl.value : 0)||0) * pesoPorCaixa;
  });

  await PUT('/api/pedidos/'+id, {status:'Atendido', lotes: lotesUsados.join(', ')});
  p.status = 'Atendido';
  p.lotes = lotesUsados.join(', ');

  var venda = {id:uid(),cliente_id:p.cliente_id,cliente:p.cliente_nome,fruta:p.fruta,quantidade:p.quantidade,quantidade_kg:kgTotal,valor:(p.valor||0)*p.quantidade,data:today(),pedido_id:p.id,origem:'pedido'};
  var res = await POST('/api/vendas', venda);
  if(res) DB.vendas.unshift(res);

  // ── AUTO ROMANEIO ──────────────────────────────────────
  var numRom = 'ROM-' + Date.now().toString(36).toUpperCase();
  var romaneio = {
    id: uid(),
    numero: numRom,
    pedido_id: id,
    cliente_nome: p.cliente_nome,
    fruta: p.fruta,
    motorista: '',
    placa: '',
    caixas: p.quantidade,
    qualidade: '',
    obs: 'Gerado automaticamente ao atender pedido',
    data: today()
  };
  var resRom = await POST('/api/romaneios', romaneio);
  if(resRom) DB.romaneios.unshift(resRom);

  closeModal();
  toast('✅ Pedido atendido! Romaneio '+numRom+' criado. '+qtd_total_text(cbs, pesoPorCaixa));
  await loadAllData();
  renderPedidos();
}

function qtd_total_text(cbs, peso) {
  var total = 0;
  cbs.forEach(function(cb){
    var el = document.querySelector('.lat-qtd[data-id="'+cb.value+'"]');
    total += (parseInt(el?el.value:0)||0) * peso;
  });
  return total.toFixed(0)+' kg abatidos do estoque';
}

async function salvarEdicaoPedido() {
  var id = window._editPedidoId;
  if(!id) return toast('Erro: ID não encontrado','err');
  var pAnt = DB.pedidos.find(function(x){return x.id===id;});
  // If pedido was Atendido and has lotes, restore stock before editing
  if(pAnt && pAnt.status === 'Atendido' && pAnt.lotes && pAnt.lotes !== 'A definir pela produção') {
    var parts = pAnt.lotes.split(',');
    for(var pi=0; pi<parts.length; pi++) {
      var m = parts[pi].trim().match(/^(.+?)\((\d+)cx\/?(\d+)?kg?\)$/);
      if(m) {
        var loteName = m[1].trim();
        var qtdRest = parseInt(m[2]);
        var loteObj = DB.entradas.find(function(e){return e.lote===loteName;});
        if(loteObj) {
          var novoSaldo = (loteObj.quantidade_atual||0) + qtdRest;
          loteObj.quantidade_atual = novoSaldo;
          loteObj.status = novoSaldo > 0 ? 'disponivel' : 'esgotado';
          await PATCH('/api/entradas/'+loteObj.id+'/saldo', {quantidade_atual: novoSaldo, status: loteObj.status});
        }
      }
    }
  }
  var p = DB.pedidos.find(function(x){return x.id===id;});
  if(!p) return;
  var cliEl = document.getElementById('ep-cli');
  var cliId = cliEl ? cliEl.value : p.cliente_id;
  var frutaEl = document.getElementById('ep-fruta');
  var fruta = frutaEl ? frutaEl.value : p.fruta;
  var qtd = parseInt((document.getElementById('ep-qtd')||{}).value)||0;
  var valor = parseFloat((document.getElementById('ep-valor')||{}).value)||0;
  var dataPed = (document.getElementById('ep-data-ped')||{}).value || p.data_pedido;
  var dataEnt = (document.getElementById('ep-data-ent')||{}).value || p.data_entrega;
  var bancas = (document.getElementById('ep-bancas')||{}).value || p.bancas;
  var obs = (document.getElementById('ep-obs')||{}).value || '';
  var cli = DB.clientes.find(function(c){return c.id===cliId;});
  var updates = {
    cliente_id: cliId,
    cliente_nome: cli ? cli.nome : p.cliente_nome,
    fruta: fruta,
    quantidade: qtd,
    quantidade_kg: qtd*(p.peso_unitario||1),
    valor: valor,
    data_pedido: dataPed,
    data_entrega: dataEnt,
    bancas: bancas,
    obs: obs
  };
  toast('⏳ Salvando...', 'warn');
  var res = await PUT('/api/pedidos/'+id, updates);
  if(res) {
    Object.assign(p, updates);
    closeModal();
    toast('✅ Pedido atualizado!');
    renderPedidos();
  } else {
    toast('❌ Erro ao salvar pedido','err');
  }
}

async function delPedido(id) {
  var p = DB.pedidos.find(function(x){return x.id===id;});
  if(!p) return;
  var msg = 'Excluir pedido de '+p.cliente_nome+'?';
  if(p.status === 'Atendido') msg += '\nAtenção: o estoque será restaurado e a venda vinculada será excluída.';
  if(!confirm(msg)) return;
  var res = await DEL('/api/pedidos/'+id+'/completo');
  if(!res) return;
  DB.pedidos = DB.pedidos.filter(function(x){return x.id!==id;});
  DB.vendas = DB.vendas.filter(function(v){return v.pedido_id !== id;});
  // Reload entradas to reflect restored stock
  await loadAllData();
  toast('✅ Pedido excluído. Estoque restaurado.');
  renderPedidos();
}

async function gerarRomaneioMulti() {
  var cbs = document.querySelectorAll('.rom-ped-cb:checked');
  if(cbs.length===0) return toast('Selecione ao menos um pedido','err');
  var motor = (document.getElementById('rom-motor')||{}).value||'';
  var placa = (document.getElementById('rom-placa')||{}).value||'';
  var rota  = (document.getElementById('rom-rota')||{}).value||'Sem rota';
  var numRom = 'ROM-'+Date.now().toString(36).toUpperCase();
  var pedsSel = [];
  cbs.forEach(function(cb){
    var p = DB.pedidos.find(function(x){return x.id===cb.value;});
    if(p) pedsSel.push(p);
  });
  var totalCx = pedsSel.reduce(function(s,p){return s+p.quantidade;},0);
  var rom = {id:uid(),numero:numRom,pedido_id:pedsSel.map(function(p){return p.id;}).join(','),
    cliente_nome:pedsSel.map(function(p){return p.cliente_nome;}).join(' | '),
    fruta:pedsSel.map(function(p){return p.fruta;}).join(', '),
    motorista:motor,placa:placa,caixas:totalCx,rota:rota,
    obs:'Rota: '+rota,data:today()};
  var res = await POST('/api/romaneios',rom);
  if(res) { DB.romaneios.unshift(res); toast('✅ Romaneio '+numRom+' criado — Rota: '+rota); }
  // Print automatically
  window._romPrint = {rom:res||rom, peds:pedsSel, rota:rota};
  imprimirMapaCarga();
  renderRomaneio();
}

function imprimirRomaneio(id) {
  var r = DB.romaneios.find(function(x){return x.id===id;});
  if(!r) return;
  var pedIds = r.pedido_id ? r.pedido_id.split(',') : [];
  var peds = pedIds.map(function(pid){ return DB.pedidos.find(function(p){return p.id===pid.trim();}); }).filter(Boolean);
  window._romPrint = {rom:r, peds:peds.length?peds:[{cliente_nome:r.cliente_nome,fruta:r.fruta,quantidade:r.caixas,quantidade_kg:r.caixas*20,bancas:'',data_entrega:'',mercadoria_nome:r.fruta}], rota:r.rota||r.obs||'—'};
  imprimirMapaCarga();
}

async function addVenda() {
  const cliId=document.getElementById('v-cli').value, fruta=document.getElementById('v-fruta').value;
  const qtd=parseFloat(document.getElementById('v-qtd').value)||0;
  const valor=parseFloat(document.getElementById('v-valor').value)||0;
  const data=document.getElementById('v-data').value;
  if(!cliId||!fruta||!qtd||!data) return toast('Preencha todos os campos','err');
  const cli=DB.clientes.find(c=>c.id===cliId);
  const res=await POST('/api/vendas',{id:uid(),cliente_id:cliId,cliente:cli ? cli.nome : '',fruta,quantidade:qtd,valor,data,origem:'manual'});
  if(res){ DB.vendas.unshift(res); toast('✓ Venda registrada'); renderVendas(); }
}
async function delVenda(id) {
  var v = DB.vendas.find(function(x){return x.id===id;});
  if(!v) return;
  var msg = 'Excluir venda de '+v.cliente+'?';
  if(v.pedido_id) msg += '\nEstoque restaurado e pedido voltará para Pendente.';
  if(v.pedido_id) msg += '\nAtenção: se tiver lote vinculado ao pedido, exclua pelo Pedido para restaurar o estoque corretamente.';
  if(!confirm(msg)) return;
  // If venda has a pedido_id, use the /completo endpoint to restore stock
  if(v.pedido_id) {
    var ped = DB.pedidos.find(function(x){return x.id===v.pedido_id;});
    if(ped && ped.status === 'Atendido' && ped.lotes && ped.lotes !== 'A definir pela produção') {
      // Restore stock via pedido completo delete
      var res = await DEL('/api/pedidos/'+v.pedido_id+'/completo');
      if(res) {
        DB.pedidos = DB.pedidos.filter(function(x){return x.id!==v.pedido_id;});
        DB.vendas = DB.vendas.filter(function(x){return x.id!==id;});
        await loadAllData();
        toast('✅ Venda excluída e estoque restaurado!');
        renderVendas();
        return;
      }
    }
  }
  // Manual venda without pedido
  if(!await DEL('/api/vendas/'+id)) return;
  DB.vendas = DB.vendas.filter(function(v){return v.id!==id;});
  toast('✅ Venda excluída!');
  renderVendas();
}

async function addPagamento() {
  const cliId=document.getElementById('pag-cli').value;
  const valor=parseFloat(document.getElementById('pag-valor').value)||0;
  const data=document.getElementById('pag-data').value;
  if(!cliId||!valor||!data) return toast('Preencha cliente, valor e data','err');
  const res=await POST('/api/pagamentos',{id:uid(),cliente_id:cliId,valor,data,forma:document.getElementById('pag-forma').value,recebedor:document.getElementById('pag-rec').value,obs:document.getElementById('pag-obs').value});
  if(res){ DB.pagamentos.unshift(res); toast('✓ Pagamento registrado'); renderFinanceiro(); }
}
async function delPagamento(id) {
  if(!await DEL(`/api/pagamentos/${id}`)) return;
  DB.pagamentos=DB.pagamentos.filter(p=>p.id!==id); renderFinanceiro();
}

function aplicarPermissoesNav() {
  var nav = document.getElementById('nav');
  if(!nav || !CURRENT_USER) return;
  var btns = nav.querySelectorAll('.nb');
  // indices: 0=dashboard,1=empresa,2=produtos,3=cadastros,4=entrada,5=pedidos,6=romaneio,7=vendas,8=caixas,9=estoque,10=financeiro,11=relatorios
  var allowedVis = [4, 9]; // visualizador: apenas entrada e estoque
  btns.forEach(function(btn, i) {
    if(CURRENT_USER.acesso === 'visualizador') {
      btn.style.display = allowedVis.indexOf(i) !== -1 ? '' : 'none';
    } else {
      btn.style.display = '';
    }
  });
}

async function init() {
  // Verificar se há usuários cadastrados
  try {
    const res = await fetch(API + '/api/tem-usuarios');
    const data = await res.json();
    if (!data.temUsuarios) {
      mostrarPrimeiroAcesso();
      return;
    }
  } catch(e) {
    document.getElementById('login-err').textContent = '⚠️ Servidor offline. Verifique a conexão.';
    document.getElementById('login-err').style.display = 'block';
    return;
  }

  // Tentar retomar sessão salva
  if (TOKEN) {
    const me = await fetch(API + '/api/me', {headers:{'x-token':TOKEN}}).then(r=>r.ok?r.json():null).catch(()=>null);
    if (me) {
      CURRENT_USER = me;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('usr-badge').textContent =
        me.acesso==='admin'?'👑 ADMIN':me.acesso==='gerente'?'⭐ GERENTE':me.acesso==='operador'?'🔧 OPERADOR':'👁 VISUALIZADOR';
      document.getElementById('usr-nome').textContent = me.nome || me.email;
      await loadAllData();
      aplicarPermissoesNav();
      goTo(CURRENT_USER.acesso === 'visualizador' ? 'entrada' : 'dashboard');
      return;
    }
  }
  TOKEN = '';
  localStorage.removeItem('org_token');
}

init();

// ── HISTÓRICO CLIENTE MODAL ─────────────────────────────
function imprimirHistoricoClienteAtual() {
  var id = window._printCliId || window._histCliId;
  var dtIni = (document.getElementById('fin-dt-ini')||{}).value || '';
  var dtFim = (document.getElementById('fin-dt-fim')||{}).value || '';
  if(id) imprimirHistoricoCliente(id, dtIni, dtFim);
}

function abrirHistoricoCliente(cliId) {
  window._histCliId = cliId;
  var cli = DB.clientes.find(function(c){return c.id===cliId;});
  if(!cli) return;
  var dtIni = (document.getElementById('fin-dt-ini')||{}).value || '';
  var dtFim = (document.getElementById('fin-dt-fim')||{}).value || '';
  var peds = DB.pedidos.filter(function(p){
    if(p.cliente_id!==cliId) return false;
    if(dtIni && p.data_pedido < dtIni) return false;
    if(dtFim && p.data_pedido > dtFim) return false;
    return true;
  });
  var pags = DB.pagamentos.filter(function(p){
    if(p.cliente_id!==cliId) return false;
    if(dtIni && p.data < dtIni) return false;
    if(dtFim && p.data > dtFim) return false;
    return true;
  });
  var totalPed = peds.reduce(function(s,p){return s+(p.valor||0)*p.quantidade;},0);
  var totalPag = pags.reduce(function(s,p){return s+(p.valor||0);},0);
  var saldo = totalPed - totalPag;
  var periodo = dtIni||dtFim ? ' | '+( dtIni?fmtDate(dtIni):'início')+' a '+(dtFim?fmtDate(dtFim):'hoje') : '';

  var pedRows = peds.map(function(p){
    return '<tr style="font-size:11px;">'
      +'<td>'+fmtDate(p.data_pedido)+'</td><td style="font-weight:600">'+p.fruta+'</td><td>'+p.quantidade+'</td>'
      +'<td>R$ '+((p.valor||0).toFixed(2))+'</td>'
      +'<td style="color:var(--accent);font-weight:700">R$ '+((p.valor||0)*p.quantidade).toFixed(2)+'</td>'
      +'<td>'+fmtDate(p.data_entrega)+'</td>'
      +'<td><span class="badge '+(p.status==='Atendido'?'bg':'by')+'">'+p.status+'</span></td>'
      +'</tr>';
  }).join('') || '<tr><td colspan="7" class="empty">Nenhum pedido</td></tr>';

  var pagRows = pags.map(function(p){
    return '<tr style="font-size:11px;">'
      +'<td>'+fmtDate(p.data)+'</td>'
      +'<td style="color:var(--green);font-weight:700">R$ '+((p.valor||0).toFixed(2))+'</td>'
      +'<td>'+(p.forma||'-')+'</td><td>'+(p.recebedor||'-')+'</td><td>'+(p.obs||'-')+'</td>'
      +'</tr>';
  }).join('') || '<tr><td colspan="5" class="empty">Nenhum pagamento</td></tr>';

  modal('<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">'
    +'<div class="section-title" style="margin:0;">👤 '+cli.nome+periodo+'</div>'
    +'<div style="display:flex;gap:6px;">'
    +'<button class="btn btn-p btn-sm" onclick="imprimirHistoricoClienteAtual()" >🖨️ PDF</button>'
    +'<button class="btn btn-s btn-sm" onclick="closeModal()">✕ Fechar</button>'
    +'</div></div>'
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;">'
    +'<div style="padding:10px;background:#060a12;border-radius:8px;text-align:center;">'
    +'<div style="font-size:10px;color:var(--muted);">Total Pedidos</div>'
    +'<div style="font-size:14px;font-weight:800;color:var(--accent)">R$ '+totalPed.toFixed(2)+'</div></div>'
    +'<div style="padding:10px;background:#060a12;border-radius:8px;text-align:center;">'
    +'<div style="font-size:10px;color:var(--muted);">Total Pago</div>'
    +'<div style="font-size:14px;font-weight:800;color:var(--green)">R$ '+totalPag.toFixed(2)+'</div></div>'
    +'<div style="padding:10px;background:#060a12;border-radius:8px;text-align:center;">'
    +'<div style="font-size:10px;color:var(--muted);">Saldo</div>'
    +'<div style="font-size:14px;font-weight:800;color:'+(saldo>0?'var(--red)':'var(--green)')+'">R$ '+Math.abs(saldo).toFixed(2)+'<br><span style="font-size:9px">'+(saldo>0?'EM ABERTO':'QUITADO')+'</span></div></div>'
    +'</div>'
    +'<div style="margin-bottom:12px;">'
    +'<div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px;">📋 Pedidos ('+peds.length+')</div>'
    +'<div class="tbl-wrap" style="max-height:200px;overflow-y:auto;">'
    +'<table class="tbl"><thead><tr><th>Data</th><th>Fruta</th><th>Qtd</th><th>Unit.</th><th>Total</th><th>Entrega</th><th>Status</th></tr></thead>'
    +'<tbody>'+pedRows+'</tbody></table></div></div>'
    +'<div>'
    +'<div style="font-size:12px;font-weight:700;color:var(--green);margin-bottom:6px;">💳 Pagamentos ('+pags.length+')</div>'
    +'<div class="tbl-wrap" style="max-height:160px;overflow-y:auto;">'
    +'<table class="tbl"><thead><tr><th>Data</th><th>Valor</th><th>Forma</th><th>Recebedor</th><th>Obs</th></tr></thead>'
    +'<tbody>'+pagRows+'</tbody></table></div></div>');
}

// ── BUSCA E FILTROS ──────────────────────────────────────
function filtrarTabelaNome(tabelaId, termo) {
  var t = termo.toLowerCase().trim();
  var tabela = document.getElementById(tabelaId);
  if(!tabela) return;
  tabela.querySelectorAll('tbody tr').forEach(function(tr) {
    var td = tr.querySelector('td');
    var nome = td ? td.textContent.toLowerCase() : '';
    tr.style.display = (!t || nome.includes(t)) ? '' : 'none';
  });
}

function filtrarFinRows(termo) {
  var t = termo.toLowerCase().trim();
  document.querySelectorAll('.fin-row').forEach(function(row) {
    var nome = row.dataset.nome || '';
    row.style.display = (!t || nome.includes(t)) ? '' : 'none';
  });
}

function limparForm(ids) {
  ids.forEach(function(id) {
    var el = document.getElementById(id);
    if(el) el.value = '';
  });
  toast('Formulário limpo');
}

var itemExtraCount = 0;

function atualizarBancaItem(sel) {
  var fruta = sel.value;
  var usaBanca = FRUTAS_BANCA.indexOf(fruta) !== -1;
  var container = sel.closest('div').parentElement.parentElement;
  // Find the bancas grid and label within this item container
  var bancaGrid = container.querySelector('[class*="item-bancas-grid"]');
  var bancaLabel = container.querySelector('[class*="item-banca-label"]');
  if(!bancaGrid) return;
  var opcoes = usaBanca ? BANCAS_LISTA : (fruta ? CALIBRES_LISTA : BANCAS_LISTA);
  var labelTxt = usaBanca ? 'Bancas de Destino' : (fruta ? 'Calibre' : 'Bancas / Calibre');
  if(bancaLabel) bancaLabel.textContent = labelTxt;
  bancaGrid.innerHTML = opcoes.map(function(o){
    return '<label class="chk-lbl" style="padding:4px 7px;font-size:10px;"><input type="checkbox" value="'+o+'" class="item-banca-cb"> '+o+'</label>';
  }).join('');
}

function removerItemExtra(n) {
  var el = document.getElementById('item-extra-' + n);
  if(el) el.remove();
}
function addItemExtra() {
  itemExtraCount++;
  var n = itemExtraCount;
  var div = document.createElement('div');
  div.id = 'item-extra-' + n;
  div.style.cssText = 'background:#0d1320;border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;';
  var frutas = ['LARANJA','PERA','LIMA TAITI','ABACATE','REPOLHO','CENOURA','MEXERICA POKAN'];
  var frutaOpts = frutas.map(function(f){ return '<option>'+f+'</option>'; }).join('');
  var mercOpts = DB.produtos.map(function(p){ return '<option value="'+p.id+'" data-peso="'+p.peso+'">'+p.nome+'</option>'; }).join('');
  var bancaHTML = BANCAS_LISTA.map(function(b){
    return '<label class="chk-lbl" style="padding:4px 7px;font-size:10px;"><input type="checkbox" value="'+b+'" class="item-banca-cb"> '+b+'</label>';
  }).join('');
  div.innerHTML = '<div style="display:flex;justify-content:space-between;margin-bottom:8px;">'
    + '<span style="font-size:11px;font-weight:700;color:var(--accent);">Item Extra '+n+'</span>'
    + '<button class="btn btn-r btn-sm" onclick="removerItemExtra('+n+')">✕ Remover</button>'
    + '</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;">'
    + '<div><label class="lbl">Fruta</label><select class="inp item-fruta" onchange="atualizarBancaItem(this)">'+frutaOpts+'</select></div>'
    + '<div><label class="lbl">Mercadoria</label><select class="inp item-merc">'+mercOpts+'</select></div>'
    + '<div><label class="lbl">Quantidade</label><input type="number" class="inp item-qtd" placeholder="0" min="1"></div>'
    + '</div>'
    + '<div><label class="lbl item-banca-label-'+n+'">Bancas de Destino</label>'
    + '<div class="chk-grid item-bancas-grid-'+n+'" style="margin-top:4px;">'+bancaHTML+'</div></div>';
  document.getElementById('itens-extras').appendChild(div);
}

    <div class="print-header">
      <div>
        <div class="print-logo">${DB.empresa.nome||'Organize'}</div>
        <div class="print-sub"><div class="brand-sub" style="font-size:9px;color:var(--muted);">Sistema Elaborado por Organize Consultoria Operacional (11) 97237-6579</div>
        <div class="print-sub">${DB.empresa.telefone||''} ${DB.empresa.email||''}</div>
      </div>
      <div style="text-align:right;font-size:10px;color:#666;">
        <div>Emitido em: ${new Date().toLocaleString('pt-BR')}</div>

      </div>
    </div>
    ${conteudoHTML}
    <div class="print-footer">Documento gerado pelo sistema Organize — ${new Date().getFullYear()}</div>

function imprimirHistoricoCliente(cliId, dtIni, dtFim) {
  var cli = DB.clientes.find(function(c){return c.id===cliId;});
  if(!cli) return;
  var peds = DB.pedidos.filter(function(p){
    if(p.cliente_id!==cliId) return false;
    if(dtIni && p.data_pedido < dtIni) return false;
    if(dtFim && p.data_pedido > dtFim) return false;
    return true;
  });
  var pags = DB.pagamentos.filter(function(p){
    if(p.cliente_id!==cliId) return false;
    if(dtIni && p.data < dtIni) return false;
    if(dtFim && p.data > dtFim) return false;
    return true;
  });
  var totalPed = peds.reduce(function(s,p){return s+(p.valor||0)*p.quantidade;},0);
  var totalPag = pags.reduce(function(s,p){return s+(p.valor||0);},0);
  var saldo = totalPed - totalPag;
  var periodo = dtIni||dtFim ? ' ('+( dtIni?fmtDate(dtIni):'início')+' a '+(dtFim?fmtDate(dtFim):'hoje')+')' : ' (todo o histórico)';
  var html = '<div class="print-title">👤 Histórico do Cliente'+periodo+'</div>'
    + '<div class="print-section"><h3>Dados do Cliente</h3>'
    + '<div class="print-row">'
    + '<div class="print-field"><div class="print-label">Nome</div><div class="print-value">'+cli.nome+'</div></div>'
    + '<div class="print-field"><div class="print-label">Contato</div><div class="print-value">'+(cli.contato||'-')+'</div></div>'
    + '<div class="print-field"><div class="print-label">Email</div><div class="print-value">'+(cli.email||'-')+'</div></div>'
    + '</div></div>'
    + '<div class="print-section"><h3>Resumo Financeiro</h3>'
    + '<div class="print-row">'
    + '<div class="print-field"><div class="print-label">Total Pedidos</div><div class="print-value">R$ '+totalPed.toFixed(2)+'</div></div>'
    + '<div class="print-field"><div class="print-label">Total Pago</div><div class="print-value" style="color:#10b981;">R$ '+totalPag.toFixed(2)+'</div></div>'
    + '<div class="print-field"><div class="print-label">Saldo Devedor</div><div class="print-value" style="color:'+(saldo>0?'#ef4444':'#10b981')+';">R$ '+Math.abs(saldo).toFixed(2)+(saldo<=0?' (quitado)':' (em aberto)')+'</div></div>'
    + '</div></div>';
  if(peds.length>0) {
    html += '<div class="print-section"><h3>Pedidos ('+peds.length+')</h3><table>'
      + '<tr><th>Data Pedido</th><th>Fruta</th><th>Qtd</th><th>Valor Unit.</th><th>Total</th><th>Entrega</th><th>Status</th></tr>'
      + peds.map(function(p){return '<tr>'
        + '<td>'+fmtDate(p.data_pedido)+'</td><td>'+p.fruta+'</td><td>'+p.quantidade+'</td>'
        + '<td>R$ '+((p.valor||0).toFixed(2))+'</td><td>R$ '+((p.valor||0)*p.quantidade).toFixed(2)+'</td>'
        + '<td>'+fmtDate(p.data_entrega)+'</td>'
        + '<td><span class="'+(p.status==='Atendido'?'badge-atend':'badge-pend')+'">'+p.status+'</span></td>'
        + '</tr>';}).join('')
      + '</table></div>';
  }
  if(pags.length>0) {
    html += '<div class="print-section"><h3>Pagamentos ('+pags.length+')</h3><table>'
      + '<tr><th>Data</th><th>Valor</th><th>Forma</th><th>Recebedor</th><th>Obs</th></tr>'
      + pags.map(function(p){return '<tr>'
        + '<td>'+fmtDate(p.data)+'</td><td style="color:#10b981;font-weight:700;">R$ '+((p.valor||0).toFixed(2))+'</td>'
        + '<td>'+(p.forma||'-')+'</td><td>'+(p.recebedor||'-')+'</td><td>'+(p.obs||'-')+'</td>'
        + '</tr>';}).join('')
      + '</table>'
      + '<div class="print-total"><span>Total Pago: R$ '+totalPag.toFixed(2)+'</span></div>'
      + '</div>';
  }
  abrirJanelaImpressao('Histórico - '+cli.nome, html);
}

function exportarExcelLote(loteId) {
  var e = DB.entradas.find(function(x){return x.id===loteId;});
  if(!e) return;
  var pedidos = DB.pedidos.filter(function(p){
    if(!p.lotes) return false;
    return p.lotes.indexOf(e.lote) !== -1;
  });
  var saldo = e.quantidade_atual != null ? e.quantidade_atual : e.quantidade;
  var totalUsado = e.quantidade - saldo;
  var totalKgUsado = totalUsado * (e.peso_unitario || 1);

  // Build CSV
  var csv = 'Lote;Fruta;Fornecedor;Data;Qtd Original;Qtd Usada;Saldo;KG Original;KG Usado;KG Saldo\n';
  var forn = DB.fornecedores.find(function(f){return f.id===e.fornecedor_id;});
  csv += e.lote+';'+e.fruta+';'+(forn?forn.nome:'-')+';'+e.data+';'+e.quantidade+';'+totalUsado+';'+saldo+';'+(e.total_kg||0).toFixed(1)+';'+totalKgUsado.toFixed(1)+';'+(saldo*(e.peso_unitario||1)).toFixed(1)+'\n\n';
  csv += 'Pedidos vinculados ao lote\n';
  csv += 'Cliente;Fruta;Quantidade;Valor Unit;Valor Total;Data Pedido;Data Entrega;Status;Lotes\n';
  pedidos.forEach(function(p){
    csv += p.cliente_nome+';'+p.fruta+';'+p.quantidade+';'+((p.valor||0).toFixed(2))+';'+((p.valor||0)*p.quantidade).toFixed(2)+';'+p.data_pedido+';'+p.data_entrega+';'+p.status+';'+p.lotes+'\n';
  });

  var blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'lote_'+e.lote+'_'+e.fruta+'.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('✅ Excel exportado!');
}

function imprimirDetalheEntrada(loteId) {

  if(!e) return;
  var forn = DB.fornecedores.find(function(f){return f.id===e.fornecedor_id;});

  var saldo = e.quantidade_atual != null ? e.quantidade_atual : e.quantidade;
  var totalUsado = e.quantidade - saldo;
  var kgOrig = e.total_kg || 0;
  var kgUsado = totalUsado * (e.peso_unitario || 1);
  var kgSaldo = saldo * (e.peso_unitario || 1);
  var totalValor = pedidos.reduce(function(s,p){return s+(p.valor||0)*p.quantidade;},0);

  var pedRows = pedidos.map(function(p){
