<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organize - Consultoria Operacional</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
<style>

*{box-sizing:border-box;margin:0;padding:0;font-family:'Sora',sans-serif;}
:root{
  --bg:#0a0e1a;--surface:#111827;--card:#1a2235;--border:#243050;
  --accent:#f97316;--accent2:#ea580c;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;
  --text:#f1f5f9;--muted:#64748b;--sub:#94a3b8;
}
html,body{height:100%;background:var(--bg);color:var(--text);overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;}
/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;padding:10px 16px;}
.hrow{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px;}
.brand{display:flex;align-items:center;gap:10px;}
#logo-box{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:22px;flex-shrink:0;}
#logo-box img{width:100%;height:100%;object-fit:cover;display:none;}
.brand-name{font-size:15px;font-weight:800;color:var(--text);}
.brand-sub{font-size:10px;color:var(--muted);}
.hright{display:flex;align-items:center;gap:8px;}
#usr-badge{background:rgba(249,115,22,.15);color:var(--accent);padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;}
nav{display:flex;gap:3px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
nav::-webkit-scrollbar{height:0;}
.nb{border:none;background:transparent;color:var(--sub);padding:5px 10px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:'Sora',sans-serif;}
.nb:hover{background:rgba(249,115,22,.1);color:var(--accent);}
.nb.active{background:var(--accent);color:#fff;}
/* MAIN */
main{flex:1;overflow-y:auto;padding:16px;}
main::-webkit-scrollbar{width:6px;}
main::-webkit-scrollbar-track{background:var(--surface);}
main::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px;}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;}
.card+.card{margin-top:16px;}
.section-title{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;margin-bottom:14px;}
/* GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;}
/* INPUTS */
.inp{background:#0d1320;border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 11px;width:100%;font-size:12px;font-family:'Sora',sans-serif;transition:border-color .2s;}
.inp:focus{outline:none;border-color:var(--accent);}
.inp option{background:#0d1320;}
.inp[disabled]{color:var(--muted);cursor:not-allowed;}
label.lbl{font-size:11px;color:var(--sub);display:block;margin-bottom:5px;font-weight:500;}
.frow{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:10px;}
/* BUTTONS */
.btn{border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:'Sora',sans-serif;transition:all .2s;}
.btn-p{background:var(--accent);color:#fff;}.btn-p:hover{background:var(--accent2);transform:translateY(-1px);}
.btn-s{background:transparent;color:var(--sub);border:1px solid var(--border);}.btn-s:hover{border-color:var(--accent);color:var(--accent);}
.btn-g{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3);}
.btn-r{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.btn-sm{padding:5px 9px;font-size:10px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;}
.bo{background:rgba(249,115,22,.2);color:var(--accent);}
.br{background:rgba(239,68,68,.2);color:var(--red);}
.bg{background:rgba(16,185,129,.2);color:var(--green);}
.by{background:rgba(245,158,11,.2);color:var(--yellow);}
/* TABLE */
.tbl{width:100%;font-size:11px;border-collapse:collapse;}
.tbl th{padding:10px;text-align:left;border-bottom:1px solid var(--border);color:var(--accent);font-weight:600;background:rgba(249,115,22,.05);}
.tbl td{padding:9px 10px;border-bottom:1px solid rgba(36,48,80,.5);color:var(--sub);}
.tbl tr:hover td{background:rgba(249,115,22,.03);}
.tbl-wrap{overflow-x:auto;}
/* STAT CARDS */
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;}
.stat-n{font-size:22px;font-weight:800;color:var(--text);}
.stat-l{font-size:10px;color:var(--muted);margin-top:3px;}
.stat-icon{font-size:12px;color:var(--accent);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--accent);border-radius:10px;padding:10px 16px;font-size:12px;color:var(--text);z-index:99999;animation:slideIn .3s ease;max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.5);}
@keyframes slideIn{from{transform:translateX(110%);opacity:0;}to{transform:translateX(0);opacity:1;}}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:50000;padding:20px;overflow-y:auto;}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:650px;width:100%;margin:auto;max-height:90vh;overflow-y:auto;}
/* CHECKBOX GROUP */
.chk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:7px;}
.chk-lbl{display:flex;align-items:center;gap:7px;cursor:pointer;padding:7px 10px;background:#0d1320;border:1px solid var(--border);border-radius:7px;font-size:11px;color:var(--sub);transition:all .2s;}
.chk-lbl input[type=checkbox]{accent-color:var(--accent);width:13px;height:13px;}
.chk-lbl:has(input:checked){border-color:var(--accent);color:var(--accent);background:rgba(249,115,22,.08);}
/* TABS */
.tabs{display:flex;gap:3px;margin-bottom:14px;}
.tab{border:none;background:transparent;color:var(--sub);padding:6px 12px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;transition:all .2s;}
.tab.active{background:var(--accent);color:#fff;}
/* RADIO GROUP */
.radio-row{display:flex;gap:8px;flex-wrap:wrap;}
.radio-lbl{display:flex;align-items:center;gap:6px;cursor:pointer;padding:7px 12px;background:#0d1320;border:1px solid var(--border);border-radius:7px;font-size:11px;color:var(--sub);}
.radio-lbl input{accent-color:var(--accent);}
/* LOTE CHECKBOX */
.lote-chk-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;max-height:220px;overflow-y:auto;padding:4px;}
.lote-chk-lbl{display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px;background:#0d1320;border:1px solid var(--border);border-radius:8px;transition:all .2s;}
.lote-chk-lbl input{accent-color:var(--accent);width:14px;height:14px;}
.lote-chk-lbl:has(input:checked){border-color:var(--accent);background:rgba(249,115,22,.07);}
/* PROGRESS BAR */
.pbar{background:rgba(36,48,80,.5);border-radius:4px;height:6px;overflow:hidden;}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .3s;}
/* PALETE BOX */
.palete-box{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);border-radius:8px;padding:10px;font-size:12px;font-weight:600;color:var(--accent);margin:8px 0;}
/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:12px;}
/* ALERT BOX */
.alert-r{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px;color:var(--red);font-size:12px;}
.alert-g{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:8px;padding:12px;color:var(--green);font-size:12px;}
.alert-o{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);border-radius:8px;padding:12px;color:var(--accent);font-size:12px;}
/* RESPONSIVE */
@media(max-width:640px){.grid2,.grid3{grid-template-columns:1fr;}.hrow{flex-wrap:wrap;}}
/* PRINT */
@media print{header,nav,.no-print{display:none!important;}body{background:white;color:black;}main{overflow:visible;padding:0;}}
/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999999;padding:20px;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:36px 32px;max-width:460px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.6);}
.login-logo{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;}
.login-title{text-align:center;font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px;}
.login-sub{text-align:center;font-size:12px;color:var(--muted);margin-bottom:28px;}
.login-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);border-radius:8px;padding:10px;font-size:12px;color:var(--red);margin-bottom:14px;display:none;}
/* BADGE ACESSO */
.badge-admin{background:rgba(249,115,22,.2);color:var(--accent);}
.badge-gerente{background:rgba(99,102,241,.2);color:#818cf8;}
.badge-operador{background:rgba(16,185,129,.2);color:var(--green);}
.badge-visualizador{background:rgba(100,116,139,.2);color:var(--sub);}

</style>
</head>

<script>
// ═══════════════════════════════════════════════════════
// CONFIGURAÇÃO — altere para o endereço do seu servidor
// ═══════════════════════════════════════════════════════
const API = window.location.origin; // mesmo servidor que serve o HTML
// Se rodar em servidor diferente: const API = 'http://SEU-IP:3000';

// ═══════════════════════════════════════════════════════
// CAMADA DE API
// ═══════════════════════════════════════════════════════
let TOKEN = localStorage.getItem('org_token') || '';
let CURRENT_USER = null;
let DB = {}; // cache local dos dados

async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'x-token': TOKEN },
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(API + path, opts);
    if (res.status === 401) { logout(); return null; }
    const data = await res.json();
    if (!res.ok) { toast(data.erro || 'Erro na operação', 'err'); return null; }
    return data;
  } catch(e) {
    setOffline();
    toast('Sem conexão com o servidor', 'err');
    return null;
  }
}

const GET  = (p)    => api('GET',    p);
const POST = (p, b) => api('POST',   p, b);
const PUT  = (p, b) => api('PUT',    p, b);
const DEL  = (p)    => api('DELETE', p);
const PATCH= (p, b) => api('PATCH',  p, b);

function setOffline() {
  const el = document.getElementById('conn-status');
  if (el) { el.textContent = '● offline'; el.style.background = 'rgba(239,68,68,.2)'; el.style.color = 'var(--red)'; }
}
function setOnline() {
  const el = document.getElementById('conn-status');
  if (el) { el.textContent = '● online'; el.style.background = 'rgba(16,185,129,.2)'; el.style.color = 'var(--green)'; }
}

// ═══════════════════════════════════════════════════════
// CARREGAR TODOS OS DADOS DO SERVIDOR
// ═══════════════════════════════════════════════════════
async function loadAllData() {
  const [empresa, produtos, fornecedores, clientes, entradas, pedidos,
         romaneios, vendas, retornos_caixa, saidas_caixa, pagamentos, descartes] =
    await Promise.all([
      GET('/api/empresa'),
      GET('/api/produtos'),
      GET('/api/fornecedores'),
      GET('/api/clientes'),
      GET('/api/entradas'),
      GET('/api/pedidos'),
      GET('/api/romaneios'),
      GET('/api/vendas'),
      GET('/api/retornos_caixa'),
      GET('/api/saidas_caixa'),
      GET('/api/pagamentos'),
      GET('/api/descartes'),
    ]);

  DB = {
    empresa:       empresa || {nome:'Organize',cnpj:'',telefone:'',email:'',endereco:'',logo:''},
    produtos:      produtos || [],
    fornecedores:  fornecedores || [],
    clientes:      clientes || [],
    entradas:      entradas || [],
    pedidos:       pedidos || [],
    romaneios:     romaneios || [],
    vendas:        vendas || [],
    retornos_caixa: retornos_caixa || [],
    saidas_caixa:  saidas_caixa || [],
    pagamentos:    pagamentos || [],
    descartes:     descartes || [],
    usuarios:      [],
  };

  if (CURRENT_USER?.acesso === 'admin') {
    DB.usuarios = await GET('/api/usuarios') || [];
  }

  setOnline();
  syncHeader();
}

// ═══════════════════════════════════════════════════════
// UTILITÁRIOS
// ═══════════════════════════════════════════════════════
function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }
function today() { return new Date().toISOString().split('T')[0]; }
function tomorrow() { const d=new Date(); d.setDate(d.getDate()+1); return d.toISOString().split('T')[0]; }
function fmtDate(d) { if(!d) return '-'; try{return new Date(d+'T12:00:00').toLocaleDateString('pt-BR');}catch{return d;} }
function calcPaletes(qtd,unid=30) { const c=Math.floor(qtd/unid),r=qtd%unid; return{completos:c,resto:r,total:c+(r>0?1:0)}; }
function fmtMoney(v) { return 'R$ '+(v||0).toFixed(2).replace('.',','); }
function canEdit() { return CURRENT_USER && ['admin','gerente','operador'].includes(CURRENT_USER.acesso); }
function isAdmin() { return CURRENT_USER?.acesso === 'admin'; }

function toast(msg, type='ok') {
  const t=document.createElement('div');
  t.className='toast';
  t.style.borderColor=type==='err'?'var(--red)':type==='warn'?'var(--yellow)':'var(--accent)';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3500);
}

function modal(html) {
  const bg=document.createElement('div');
  bg.className='modal-bg';
  bg.innerHTML=`<div class="modal-box">${html}</div>`;
  bg.addEventListener('click',e=>{if(e.target===bg) bg.remove();});
  document.body.appendChild(bg);
  lucide.createIcons();
  return bg;
}
function closeModal() { document.querySelector('.modal-bg')?.remove(); }

function syncHeader() {
  const e = DB.empresa || {};
  document.getElementById('emp-nome-header').textContent = e.nome || 'Organize';
}

// ═══════════════════════════════════════════════════════
// LOGIN / LOGOUT
// ═══════════════════════════════════════════════════════
function togglePass() {
  const p = document.getElementById('login-pass');
  p.type = p.type === 'password' ? 'text' : 'password';
}

async function loginSubmit() {
  const email = document.getElementById('login-user').value.trim();
  const senha = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  const btn = document.getElementById('btn-entrar');
  const loading = document.getElementById('login-loading');
  err.style.display = 'none';
  if (!email || !senha) { err.textContent='Preencha e-mail e senha.'; err.style.display='block'; return; }

  btn.disabled = true;
  loading.style.display = 'block';

  const res = await fetch(API + '/api/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({email, senha})
  }).catch(() => null);

  btn.disabled = false;
  loading.style.display = 'none';

  if (!res || !res.ok) {
    err.textContent = 'E-mail ou senha incorretos.';
    err.style.display = 'block';
    return;
  }

  const data = await res.json();
  TOKEN = data.token;
  CURRENT_USER = data.usuario;

  document.getElementById('login-pass').value = senha;

  await loginSubmit();

function getLotesDisponiveis(fruta) {
  return DB.entradas.filter(e => e.fruta===fruta && (e.quantidade_atual??e.quantidade)>0 && e.status!=='esgotado');
}
async function abaterLote(lote_id, unidades) {
  const e = DB.entradas.find(e=>e.id===lote_id);
  if (!e) return;
  e.quantidade_atual = Math.max(0, (e.quantidade_atual??e.quantidade) - unidades);
  const status = e.quantidade_atual === 0 ? 'esgotado' : 'disponivel';
  e.status = status;
  await PATCH(`/api/entradas/${lote_id}/saldo`, {quantidade_atual: e.quantidade_atual, status});
}
async function restaurarLote(lote_id, unidades) {
  const e = DB.entradas.find(e=>e.id===lote_id);
  if (!e) return;
  e.quantidade_atual = (e.quantidade_atual??e.quantidade) + unidades;
  e.status = 'disponivel';
  await PATCH(`/api/entradas/${lote_id}/saldo`, {quantidade_atual: e.quantidade_atual, status:'disponivel'});
}

function calcEntKg() {

  const p=parseFloat(document.getElementById('en-peso').value)||1;

}
async function addEntrada() {

  const obs=document.getElementById('en-obs').value;
  if(!fruta||!qtd||!data) return toast('Preencha fruta, quantidade e data','err');

  const payload={id:uid(),lote,fruta,fornecedor_id:fornId,tipo,quantidade:qtd,quantidade_atual:qtd,peso_unitario:tipo==='kg'?1:peso,total_kg:totalKg,data,obs,status:'disponivel'};
  const res=await POST('/api/entradas',payload);
  if(res){ DB.entradas.unshift(res); toast(`✓ Entrada: ${lote} | ${totalKg.toFixed(1)} kg`); renderEntrada(); }
}
async function delEntrada(id) {
  if(!await DEL(`/api/entradas/${id}`)) return;
  DB.entradas=DB.entradas.filter(e=>e.id!==id); toast('Entrada removida'); renderEntrada();

function atualizarLotesPed() {
  const fruta=document.getElementById('ped-fruta').value;
  const mercEl=document.getElementById('ped-merc');
  const peso=parseFloat(mercEl.options[mercEl.selectedIndex]?.dataset?.peso)||20;
  const qtd=parseInt(document.getElementById('ped-qtd').value)||0;
  const container=document.getElementById('lotes-ped');
  if(!fruta){ container.innerHTML='<div class="empty">Selecione a fruta</div>'; return; }
  const lotes=getLotesDisponiveis(fruta);
  if(lotes.length===0){ container.innerHTML='<div style="color:var(--red);font-size:12px;padding:10px;">❌ Sem estoque.</div>'; return; }
  container.innerHTML=lotes.map(l=>{
    const saldo=l.quantidade_atual??l.quantidade;
    return`<label class="lote-chk-lbl"><input type="checkbox" class="lote-cb" value="${l.id}" data-lote="${l.lote}" data-saldo="${saldo}" data-peso="${l.peso_unitario||1}" onchange="updateLoteInfo()">
    <div><div style="font-size:11px;font-weight:700;color:var(--text)">${l.lote}</div><div style="font-size:10px;color:var(--sub)">${saldo} unid.</div></div></label>`;
  }).join('');
  if(qtd>0&&mercEl.value) document.getElementById('lotes-ped-info').innerHTML=`<span style="color:var(--accent)">Necessário: ${qtd} × ${peso}kg = <strong>${(qtd*peso).toFixed(1)} kg</strong></span>`;
}
function updateLoteInfo() {
  const cbs=document.querySelectorAll('.lote-cb:checked');
  const lotes=Array.from(cbs).map(c=>c.dataset.lote).join(', ');
  const kgTotal=Array.from(cbs).reduce((s,c)=>s+parseFloat(c.dataset.saldo)*parseFloat(c.dataset.peso),0);
  document.getElementById('lotes-ped-info').innerHTML=cbs.length>0?`<span style="color:var(--green)">✓ ${lotes} | ${kgTotal.toFixed(1)} kg</span>`:'Nenhum selecionado';
}
async function addPedido() {
  const cliId=document.getElementById('ped-cli').value;
  const fruta=document.getElementById('ped-fruta').value;
  const mercEl=document.getElementById('ped-merc');
  const mercId=mercEl.value;
  const peso=parseFloat(mercEl.options[mercEl.selectedIndex]?.dataset?.peso)||20;
  const qtd=parseInt(document.getElementById('ped-qtd').value)||0;
  const valor=parseFloat(document.getElementById('ped-valor').value)||0;
  const dataPed=document.getElementById('ped-data-ped').value;
  const dataEnt=document.getElementById('ped-data-ent').value;
  const bancas=Array.from(document.querySelectorAll('.banca-cb:checked')).map(c=>c.value).join(', ');
  const lotesCbs=document.querySelectorAll('.lote-cb:checked');
  const obs=document.getElementById('ped-obs').value;
  if(!cliId||!fruta||!mercId||!qtd||!dataPed||!dataEnt) return toast('Preencha todos os campos obrigatórios','err');
  if(!bancas) return toast('Selecione ao menos uma banca','err');
  if(lotesCbs.length===0) return toast('Selecione ao menos um lote','err');
  const kgNec=qtd*peso;
  const kgDisp=Array.from(lotesCbs).reduce((s,c)=>s+parseFloat(c.dataset.saldo)*parseFloat(c.dataset.peso),0);
  if(kgDisp<kgNec) return toast(`Estoque insuficiente. Disponível: ${kgDisp.toFixed(1)} kg`,'err');
  const lotesArr=Array.from(lotesCbs).map(c=>c.dataset.lote);
  // Abater lotes
  for(const cb of lotesCbs) await abaterLote(cb.value, Math.min(parseFloat(cb.dataset.saldo), Math.ceil(kgNec/parseFloat(cb.dataset.peso))));
  const cli=DB.clientes.find(c=>c.id===cliId);
  const merc=DB.produtos.find(p=>p.id===mercId);
  const payload={id:uid(),cliente_id:cliId,cliente_nome:cli?.nome||'',fruta,mercadoria_id:mercId,mercadoria_nome:merc?.nome||'',peso_unitario:peso,quantidade:qtd,quantidade_kg:kgNec,valor,data_pedido:dataPed,data_entrega:dataEnt,bancas,lotes:lotesArr.join(', '),obs,status:'Pendente'};
  const res=await POST('/api/pedidos',payload);
  if(res){ DB.pedidos.unshift(res); toast('✓ Pedido criado!'); renderPedidos(); }
}
async function atenderPedido(id) {
  const p=DB.pedidos.find(x=>x.id===id); if(!p) return;
  await PUT(`/api/pedidos/${id}`,{status:'Atendido'});
  p.status='Atendido';
  const venda={id:uid(),cliente_id:p.cliente_id,cliente:p.cliente_nome,fruta:p.fruta,quantidade:p.quantidade,quantidade_kg:p.quantidade_kg,valor:(p.valor||0)*p.quantidade,data:today(),pedido_id:p.id,origem:'pedido'};
  const res=await POST('/api/vendas',venda);
  if(res){ DB.vendas.unshift(res); toast('✓ Pedido atendido e venda gerada!'); renderPedidos(); }
}
async function delPedido(id) {
  if(!await DEL(`/api/pedidos/${id}`)) return;
  DB.pedidos=DB.pedidos.filter(x=>x.id!==id); toast('Pedido removido'); renderPedidos();
}

      <td><span class="badge ${v.origem==='pedido'?'bg':'bo'}">${v.origem==='pedido'?'Pedido':'Manual'}</span></td>
      <td><button class="btn btn-r btn-sm" onclick="delVenda('${v.id}')"><i data-lucide="trash-2" style="width:11px;height:11px;"></i></button></td>
    </tr>`).join('')||'<tr><td colspan="7" class="empty">Nenhuma venda</td></tr>'}
    </tbody></table></div>
  </div>`;
  lucide.createIcons();
}
async function addVenda() {
  const cliId=document.getElementById('v-cli').value, fruta=document.getElementById('v-fruta').value;
  const qtd=parseFloat(document.getElementById('v-qtd').value)||0;
  const valor=parseFloat(document.getElementById('v-valor').value)||0;
  const data=document.getElementById('v-data').value;
  if(!cliId||!fruta||!qtd||!data) return toast('Preencha todos os campos','err');
  const cli=DB.clientes.find(c=>c.id===cliId);
  const res=await POST('/api/vendas',{id:uid(),cliente_id:cliId,cliente:cli?.nome||'',fruta,quantidade:qtd,valor,data,origem:'manual'});
  if(res){ DB.vendas.unshift(res); toast('✓ Venda registrada'); renderVendas(); }
}
async function delVenda(id) {
  if(!await DEL(`/api/vendas/${id}`)) return;
  DB.vendas=DB.vendas.filter(v=>v.id!==id); renderVendas();
}

// ═══════════════════════════════════════════════════════
// CAIXAS
// ═══════════════════════════════════════════════════════
let tabCaixa='retornos';
function renderCaixas() {
  document.getElementById('content').innerHTML=`
  <div class="tabs">
    <button class="tab ${tabCaixa==='retornos'?'active':''}" onclick="switchCaixa('retornos')">📥 Retornos</button>
    <button class="tab ${tabCaixa==='saidas'?'active':''}" onclick="switchCaixa('saidas')">📤 Saídas</button>
    <button class="tab ${tabCaixa==='relatorio'?'active':''}" onclick="switchCaixa('relatorio')">📊 Relatório</button>
  </div>
  <div id="caixa-content"></div>`;
  renderCaixaTab(); lucide.createIcons();
}
function switchCaixa(tab){ tabCaixa=tab; renderCaixas(); }
function renderCaixaTab() {
  const div=document.getElementById('caixa-content');

    div.innerHTML=`<div class="grid2">
    <div class="card"><div class="section-title">Registrar Retorno</div>
      <div style="margin-bottom:10px;"><label class="lbl">Cliente</label><select class="inp" id="ret-cli"><option value="">Selecione</option>${DB.clientes.map(c=>`<option value="${c.id}">${c.nome}</option>`).join('')}</select></div>
      <div class="frow"><div><label class="lbl">Data</label><input class="inp" id="ret-data" type="date" value="${today()}"></div><div><label class="lbl">Quantidade</label><input class="inp" id="ret-qtd" type="number" placeholder="0"></div></div>
      <div style="margin-bottom:10px;"><label class="lbl">Marca</label><select class="inp" id="ret-marca"><option value="">Selecione</option>${MARCAS_CAIXA.map(m=>`<option value="${m.nome}">${m.nome} (${m.tamanho})</option>`).join('')}</select></div>
      <div style="margin-bottom:10px;"><label class="lbl">Obs</label><input class="inp" id="ret-obs" placeholder="Estado das caixas..."></div>
      <button class="btn btn-p" onclick="addRetorno()"><i data-lucide="plus" style="width:13px;height:13px;"></i> Registrar</button>
    </div>
    <div class="card"><div class="section-title">Retornos Recentes</div>
    ${DB.retornos_caixa.slice(0,10).map(r=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);">
      <div style="display:flex;justify-content:space-between;">
        <div style="font-size:12px;font-weight:600;color:var(--text)">${DB.clientes.find(c=>c.id===r.cliente_id)?.nome||'-'}</div>
        <button class="btn btn-r btn-sm" onclick="delRetorno('${r.id}')"><i data-lucide="trash-2" style="width:11px;height:11px;"></i></button>
      </div>
      <div style="font-size:10px;color:var(--muted)">${fmtDate(r.data)} | ${r.quantidade} cx | ${r.marca}</div>
    </div>`).join('')||'<div class="empty">Nenhum retorno</div>'}
    </div></div>`;
  } else if(tabCaixa==='saidas') {
    div.innerHTML=`<div class="grid2">
    <div class="card"><div class="section-title">Registrar Saída</div>
      <div style="margin-bottom:10px;"><label class="lbl">Cliente</label><select class="inp" id="sai-cli"><option value="">Selecione</option>${DB.clientes.map(c=>`<option value="${c.id}">${c.nome}</option>`).join('')}</select></div>
      <div class="frow"><div><label class="lbl">Data</label><input class="inp" id="sai-data" type="date" value="${today()}"></div><div><label class="lbl">Quantidade</label><input class="inp" id="sai-qtd" type="number" placeholder="0"></div></div>
      <div style="margin-bottom:10px;"><label class="lbl">Marca</label><select class="inp" id="sai-marca"><option value="">Selecione</option>${MARCAS_CAIXA.map(m=>`<option value="${m.nome}">${m.nome} (${m.tamanho})</option>`).join('')}</select></div>
      <div style="margin-bottom:10px;"><label class="lbl">Obs</label><input class="inp" id="sai-obs" placeholder="Detalhes..."></div>
      <button class="btn btn-p" onclick="addSaida()"><i data-lucide="plus" style="width:13px;height:13px;"></i> Registrar</button>
    </div>
    <div class="card"><div class="section-title">Saídas Recentes</div>
    ${DB.saidas_caixa.slice(0,10).map(s=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);">
      <div style="display:flex;justify-content:space-between;">
        <div style="font-size:12px;font-weight:600;color:var(--text)">${DB.clientes.find(c=>c.id===s.cliente_id)?.nome||'-'}</div>
        <button class="btn btn-r btn-sm" onclick="delSaida('${s.id}')"><i data-lucide="trash-2" style="width:11px;height:11px;"></i></button>
      </div>
      <div style="font-size:10px;color:var(--muted)">${fmtDate(s.data)} | ${s.quantidade} cx | ${s.marca}</div>
    </div>`).join('')||'<div class="empty">Nenhuma saída</div>'}
    </div></div>`;
  } else {
    const rows=DB.clientes.map(c=>{
      const env=DB.saidas_caixa.filter(s=>s.cliente_id===c.id).reduce((s,x)=>s+(x.quantidade||0),0);
      const ret=DB.retornos_caixa.filter(r=>r.cliente_id===c.id).reduce((s,x)=>s+(x.quantidade||0),0);

async function addRetorno() {

async function delRetorno(id) {

  DB.retornos_caixa=DB.retornos_caixa.filter(r=>r.id!==id); renderCaixas();

async function addSaida() {

async function delSaida(id) {

// ═══════════════════════════════════════════════════════
// ESTOQUE
// ═══════════════════════════════════════════════════════
function renderEstoque() {
  const saldos=DB.entradas.map(e=>{
    const saldo=e.quantidade_atual??e.quantidade;
    return{...e,saldo,kg:saldo*(e.peso_unitario||1),forn_nome:DB.fornecedores.find(f=>f.id===e.fornecedor_id)?.nome||'-'};
  });
  const kgTotal=saldos.filter(s=>s.saldo>0).reduce((t,s)=>t+s.kg,0);
  document.getElementById('content').innerHTML=`
  <div class="grid4" style="margin-bottom:16px;">
    <div class="stat"><div class="stat-icon">📦 Lotes c/ Estoque</div><div class="stat-n">${saldos.filter(s=>s.saldo>0).length}</div></div>
    <div class="stat"><div class="stat-icon">⚖️ KG Disponível</div><div class="stat-n">${kgTotal.toFixed(0)}</div></div>
    <div class="stat"><div class="stat-icon">🔴 Esgotados</div><div class="stat-n">${saldos.filter(s=>s.saldo<=0).length}</div></div>
    <div class="stat"><div class="stat-icon">📋 Total Entradas</div><div class="stat-n">${saldos.length}</div></div>
  </div>
  <div class="card">
    <div class="section-title">Detalhamento por Lote</div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Lote</th><th>Fruta</th><th>Fornecedor</th><th>Data</th><th>Original</th><th>Saldo</th><th>KG</th><th>Status</th></tr></thead><tbody>
    ${saldos.map(s=>`<tr>
      <td><span class="badge bo">${s.lote}</span></td>
      <td style="color:var(--text);font-weight:600">${s.fruta}</td>
      <td>${s.forn_nome}</td><td>${fmtDate(s.data)}</td><td>${s.quantidade}</td>
      <td><strong style="color:${s.saldo>0?'var(--green)':'var(--red)'}">${s.saldo}</strong></td>
      <td><strong style="color:${s.saldo>0?'var(--accent)':'var(--muted)'}">${s.kg.toFixed(1)} kg</strong></td>
      <td><span class="badge ${s.saldo>0?'bg':'br'}">${s.saldo>0?'✓ Disponível':'✗ Esgotado'}</span></td>
    </tr>`).join('')||'<tr><td colspan="8" class="empty">Nenhum lote</td></tr>'}
    </tbody></table></div>
  </div>`;
  lucide.createIcons();
}

// ═══════════════════════════════════════════════════════
// FINANCEIRO
// ═══════════════════════════════════════════════════════
function renderFinanceiro() {
  const saldos=DB.clientes.map(c=>{
    const totalPed=DB.pedidos.filter(p=>p.cliente_id===c.id).reduce((s,p)=>s+(p.valor||0)*p.quantidade,0);
    const totalPag=DB.pagamentos.filter(p=>p.cliente_id===c.id).reduce((s,p)=>s+(p.valor||0),0);
    return{...c,totalPed,totalPag,saldo:totalPed-totalPag};
  }).filter(c=>c.totalPed>0);
  const totalDevedor=saldos.reduce((s,c)=>s+Math.max(0,c.saldo),0);
  document.getElementById('content').innerHTML=`
  <div class="grid4" style="margin-bottom:16px;">
    <div class="stat"><div class="stat-icon">💰 A Receber</div><div class="stat-n" style="color:var(--red)">${fmtMoney(totalDevedor)}</div></div>
    <div class="stat"><div class="stat-icon">✓ Recebido</div><div class="stat-n" style="color:var(--green)">${fmtMoney(DB.pagamentos.reduce((s,p)=>s+(p.valor||0),0))}</div></div>
    <div class="stat"><div class="stat-icon">👥 Com Saldo</div><div class="stat-n">${saldos.filter(c=>c.saldo>0).length}</div></div>
    <div class="stat"><div class="stat-icon">💳 Pagamentos</div><div class="stat-n">${DB.pagamentos.length}</div></div>
  </div>
  <div class="grid2">
    <div class="card" style="margin-bottom:0;">
      <div class="section-title">Registrar Pagamento</div>
      <div style="margin-bottom:10px;"><label class="lbl">Cliente</label><select class="inp" id="pag-cli"><option value="">Selecione</option>${DB.clientes.map(c=>`<option value="${c.id}">${c.nome}</option>`).join('')}</select></div>
      <div class="frow"><div><label class="lbl">Valor (R$)</label><input class="inp" id="pag-valor" type="number" step="0.01" placeholder="0,00"></div>
      <div><label class="lbl">Data</label><input class="inp" id="pag-data" type="date" value="${today()}"></div></div>
      <div style="margin-bottom:10px;"><label class="lbl">Forma</label><select class="inp" id="pag-forma"><option value="">Selecione</option><option>Dinheiro</option><option>PIX</option><option>Cartão Débito</option><option>Cartão Crédito</option><option>Transferência</option><option>Boleto</option></select></div>
      <div style="margin-bottom:10px;"><label class="lbl">Recebedor</label><input class="inp" id="pag-rec" placeholder="Quem recebeu"></div>
      <div style="margin-bottom:10px;"><label class="lbl">Obs</label><input class="inp" id="pag-obs" placeholder="Observações..."></div>
      <button class="btn btn-p" onclick="addPagamento()"><i data-lucide="plus" style="width:13px;height:13px;"></i> Registrar</button>
    </div>
    <div class="card">
      <div class="section-title">Saldo por Cliente</div>
      ${saldos.map(c=>`<div style="padding:10px 0;border-bottom:1px solid var(--border);">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
          <div style="font-weight:700;font-size:12px;color:var(--text)">${c.nome}</div>
          <span class="badge ${c.saldo>0?'br':'bg'}">${c.saldo>0?'Em Aberto':'✓ Quitado'}</span>
        </div>
        <div style="display:flex;gap:12px;font-size:10px;color:var(--muted);">
          <span>Pedidos: <strong style="color:var(--text)">${fmtMoney(c.totalPed)}</strong></span>
          <span>Pago: <strong style="color:var(--green)">${fmtMoney(c.totalPag)}</strong></span>
          <span>Saldo: <strong style="color:${c.saldo>0?'var(--red)':'var(--green)'}">${fmtMoney(Math.abs(c.saldo))}</strong></span>
        </div>
      </div>`).join('')||'<div class="empty">Nenhum cliente com pedidos</div>'}
    </div>
  </div>
  <div class="card" style="margin-top:16px;">
    <div class="section-title">Histórico de Pagamentos</div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Cliente</th><th>Valor</th><th>Forma</th><th>Recebedor</th><th>Data</th><th></th></tr></thead><tbody>
    ${DB.pagamentos.map(p=>`<tr>
      <td style="color:var(--text);font-weight:600">${DB.clientes.find(c=>c.id===p.cliente_id)?.nome||'-'}</td>
      <td style="color:var(--green);font-weight:700">${fmtMoney(p.valor)}</td>
      <td>${p.forma||'-'}</td><td>${p.recebedor||'-'}</td><td>${fmtDate(p.data)}</td>
      <td><button class="btn btn-r btn-sm" onclick="delPagamento('${p.id}')"><i data-lucide="trash-2" style="width:11px;height:11px;"></i></button></td>
    </tr>`).join('')||'<tr><td colspan="6" class="empty">Nenhum pagamento</td></tr>'}
    </tbody></table></div>
  </div>`;
  lucide.createIcons();
}
async function addPagamento() {
  const cliId=document.getElementById('pag-cli').value;
  const valor=parseFloat(document.getElementById('pag-valor').value)||0;
  const data=document.getElementById('pag-data').value;
  if(!cliId||!valor||!data) return toast('Preencha cliente, valor e data','err');
  const res=await POST('/api/pagamentos',{id:uid(),cliente_id:cliId,valor,data,forma:document.getElementById('pag-forma').value,recebedor:document.getElementById('pag-rec').value,obs:document.getElementById('pag-obs').value});
  if(res){ DB.pagamentos.unshift(res); toast('✓ Pagamento registrado'); renderFinanceiro(); }
}
async function delPagamento(id) {
  if(!await DEL(`/api/pagamentos/${id}`)) return;
  DB.pagamentos=DB.pagamentos.filter(p=>p.id!==id); renderFinanceiro();
}

// RELATÓRIOS
// ═══════════════════════════════════════════════════════
function renderRelatorios() {
  document.getElementById('content').innerHTML=`
  <div class="grid2" style="margin-bottom:16px;">
    <div class="card">
      <div class="section-title"><i data-lucide="bar-chart-3" style="width:16px;height:16px;"></i> Estatísticas Gerais</div>
      <div style="font-size:12px;line-height:2;color:var(--sub);">
        <div>📦 Entradas: <strong style="color:var(--text)">${DB.entradas.length}</strong></div>
        <div>📋 Pedidos: <strong style="color:var(--text)">${DB.pedidos.length}</strong></div>
        <div>📋 Pendentes: <strong style="color:var(--yellow)">${DB.pedidos.filter(p=>p.status==='Pendente').length}</strong></div>
        <div>💰 Vendas: <strong style="color:var(--green)">${fmtMoney(DB.vendas.reduce((s,v)=>s+(v.valor||0),0))}</strong></div>
        <div>💳 Pagamentos: <strong style="color:var(--green)">${fmtMoney(DB.pagamentos.reduce((s,p)=>s+(p.valor||0),0))}</strong></div>
      </div>
    </div>
    ${isAdmin()?`
    <div class="card">
      <div class="section-title"><i data-lucide="database" style="width:16px;height:16px;"></i> Backups</div>
      <div style="font-size:12px;color:var(--sub);margin-bottom:12px;">Backups automáticos a cada ação e a cada 10 minutos.</div>
      <button class="btn btn-p" onclick="fazerBackupManual()"><i data-lucide="save" style="width:13px;height:13px;"></i> Fazer Backup Agora</button>
      <div id="backup-lista" style="margin-top:12px;"></div>
    </div>`:''}
  </div>`;
  if(isAdmin()) carregarBackups();
  lucide.createIcons();
}
async function fazerBackupManual() {
  const res=await POST('/api/backup',{});
  if(res){ toast('✓ Backup realizado!'); carregarBackups(); }
}
async function carregarBackups() {
  const lista=await GET('/api/backups');
  if(!lista) return;
  const div=document.getElementById('backup-lista');
  if(!div) return;
  div.innerHTML=`<div style="font-size:11px;color:var(--sub);margin-bottom:6px;">Últimos backups:</div>`+
    lista.slice(0,10).map(b=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:10px;">
      <span style="color:var(--text)">${b.nome.replace('organize_','').replace('.db','')}</span>
      <span style="color:var(--muted)">${(b.tamanho/1024).toFixed(0)} KB</span>
    </div>`).join('');
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
async function init() {
  // Verificar se há usuários cadastrados
  try {
    const res = await fetch(API + '/api/tem-usuarios');
    const data = await res.json();
    if (!data.temUsuarios) {
      mostrarPrimeiroAcesso();
      return;
    }
  } catch(e) {
    document.getElementById('login-err').textContent = '⚠️ Servidor offline. Verifique a conexão.';
    document.getElementById('login-err').style.display = 'block';
    return;
  }

  // Tentar retomar sessão salva
  if (TOKEN) {
    const me = await fetch(API + '/api/me', {headers:{'x-token':TOKEN}}).then(r=>r.ok?r.json():null).catch(()=>null);
    if (me) {
      CURRENT_USER = me;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('usr-badge').textContent =
        me.acesso==='admin'?'👑 ADMIN':me.acesso==='gerente'?'⭐ GERENTE':me.acesso==='operador'?'🔧 OPERADOR':'👁 VISUALIZADOR';
      document.getElementById('usr-nome').textContent = me.nome || me.email;
      await loadAllData();
      goTo('dashboard');
      return;
    }
  }
  TOKEN = '';
  localStorage.removeItem('org_token');
}

init();
lucide.createIcons();
</script>
