      +'<td style="color:#f97316;font-weight:700;">R$ '+((p.valor||0)*p.quantidade).toFixed(2)+'</td>'
      +'<td>'+p.data_pedido+'</td><td>'+p.data_entrega+'</td>'
      +'<td><span style="background:'+(p.status==='Atendido'?'#d1fae5':'#fef3c7')+';color:'+(p.status==='Atendido'?'#065f46':'#92400e')+';padding:2px 7px;border-radius:10px;font-size:10px;">'+p.status+'</span></td>'
      +'</tr>';
  }).join('') || '<tr><td colspan="8" style="text-align:center;color:#999;padding:12px;">Nenhum pedido vinculado a este lote</td></tr>';

  var html = '<div class="pt">📦 Detalhes do Lote — '+e.lote+'</div>'
    +'<div class="sec"><h3>Informações do Lote</h3><div class="row">'
    +'<div class="fld"><div class="lbl">Lote</div><div class="val" style="color:#f97316;">'+e.lote+'</div></div>'
    +'<div class="fld"><div class="lbl">Fruta</div><div class="val">'+e.fruta+'</div></div>'
    +'<div class="fld"><div class="lbl">Fornecedor</div><div class="val">'+(forn?forn.nome:'-')+'</div></div>'
    +'<div class="fld"><div class="lbl">Data Entrada</div><div class="val">'+fmtDate(e.data)+'</div></div>'
    +'</div><div class="row">'
    +'<div class="fld"><div class="lbl">Qtd Original</div><div class="val">'+e.quantidade+' un</div></div>'
    +'<div class="fld"><div class="lbl">Qtd Usada</div><div class="val" style="color:#ef4444;">'+totalUsado+' un</div></div>'
    +'<div class="fld"><div class="lbl">Saldo</div><div class="val" style="color:'+(saldo>0?'#10b981':'#ef4444')+';">'+saldo+' un</div></div>'
    +'<div class="fld"><div class="lbl">Peso/un</div><div class="val">'+(e.peso_unitario||1)+' kg</div></div>'
    +'</div><div class="row">'
    +'<div class="fld"><div class="lbl">KG Original</div><div class="val">'+kgOrig.toFixed(1)+' kg</div></div>'
    +'<div class="fld"><div class="lbl">KG Usado</div><div class="val" style="color:#ef4444;">'+kgUsado.toFixed(1)+' kg</div></div>'
    +'<div class="fld"><div class="lbl">KG Saldo</div><div class="val" style="color:'+(kgSaldo>0?'#10b981':'#ef4444')+';">'+kgSaldo.toFixed(1)+' kg</div></div>'
    +'<div class="fld"><div class="lbl">Valor Total Pedidos</div><div class="val" style="color:#f97316;font-size:14px;">R$ '+totalValor.toFixed(2)+'</div></div>'
    +'</div></div>'
    +'<div class="sec"><h3>Pedidos Vinculados ('+pedidos.length+')</h3>'
    +'<table><tr><th>Cliente</th><th>Fruta</th><th>Qtd</th><th>Unit.</th><th>Total</th><th>Data Ped.</th><th>Entrega</th><th>Status</th></tr>'
    +pedRows+'</table></div>';

  abrirJanelaImpressao('Lote '+e.lote+' — '+e.fruta, html);
}

function abrirDetalheEntrada(loteId) {
  var e = DB.entradas.find(function(x){return x.id===loteId;});
  if(!e) return;
  var forn = DB.fornecedores.find(function(f){return f.id===e.fornecedor_id;});
  var pedidos = DB.pedidos.filter(function(p){return p.lotes && p.lotes.indexOf(e.lote) !== -1;});
  var saldo = e.quantidade_atual != null ? e.quantidade_atual : e.quantidade;
  var totalUsado = e.quantidade - saldo;
  var kgOrig = e.total_kg || 0;
  var kgUsado = totalUsado * (e.peso_unitario || 1);
  var kgSaldo = saldo * (e.peso_unitario || 1);
  var totalValorPeds = pedidos.reduce(function(s,p){return s+(p.valor||0)*p.quantidade;},0);
  var pct = e.quantidade > 0 ? Math.round((totalUsado/e.quantidade)*100) : 0;

  var pedRows = pedidos.length === 0
    ? '<tr><td colspan="8" class="empty">Nenhum pedido vinculado a este lote</td></tr>'
    : pedidos.map(function(p){
        return '<tr style="font-size:11px;">'
          +'<td style="font-weight:600;color:var(--text)">'+p.cliente_nome+'</td>'
          +'<td>'+p.fruta+'</td><td>'+p.quantidade+' un</td>'
          +'<td>R$ '+((p.valor||0).toFixed(2))+'</td>'
          +'<td style="color:var(--accent);font-weight:700;">R$ '+((p.valor||0)*p.quantidade).toFixed(2)+'</td>'
          +'<td>'+fmtDate(p.data_pedido)+'</td>'
          +'<td>'+fmtDate(p.data_entrega)+'</td>'
          +'<td><span class="badge '+(p.status==='Atendido'?'bg':'by')+'">'+p.status+'</span></td>'
          +'</tr>';
      }).join('');

  modal(
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">'
    +'<div class="section-title" style="margin:0;">📦 Lote: <span style="color:var(--accent)">'+e.lote+'</span> — '+e.fruta+'</div>'
    +'<div style="display:flex;gap:6px;">'
    +'<button class="btn btn-g btn-sm" data-lid="'+loteId+'" onclick="exportarExcelLote(this.dataset.lid)">📊 Excel</button>'
    +'<button class="btn btn-p btn-sm" data-lid="'+loteId+'" onclick="imprimirDetalheEntrada(this.dataset.lid)">🖨️ PDF</button>'
    +'<button class="btn btn-s btn-sm" onclick="closeModal()">✕ Fechar</button>'
    +'</div></div>'

    // Cards resumo
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;">'
    +'<div style="padding:10px;background:#060a12;border-radius:8px;text-align:center;">'
    +'<div style="font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:3px;">Qtd Original</div>'
    +'<div style="font-size:18px;font-weight:800;color:var(--text)">'+e.quantidade+'</div>'
    +'<div style="font-size:9px;color:var(--muted)">'+kgOrig.toFixed(1)+' kg</div>'
    +'</div>'
    +'<div style="padding:10px;background:#060a12;border-radius:8px;text-align:center;">'
    +'<div style="font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:3px;">Qtd Usada</div>'
    +'<div style="font-size:18px;font-weight:800;color:var(--red)">'+totalUsado+'</div>'
    +'<div style="font-size:9px;color:var(--muted)">'+kgUsado.toFixed(1)+' kg ('+pct+'%)</div>'
    +'</div>'
    +'<div style="padding:10px;background:#060a12;border-radius:8px;text-align:center;">'
    +'<div style="font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:3px;">Saldo</div>'
    +'<div style="font-size:18px;font-weight:800;color:'+(saldo>0?'var(--green)':'var(--red)')+'">'+saldo+'</div>'
    +'<div style="font-size:9px;color:var(--muted)">'+kgSaldo.toFixed(1)+' kg</div>'
    +'</div>'
    +'<div style="padding:10px;background:#060a12;border-radius:8px;text-align:center;">'
    +'<div style="font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:3px;">Valor Pedidos</div>'
    +'<div style="font-size:15px;font-weight:800;color:var(--accent)">R$ '+totalValorPeds.toFixed(2)+'</div>'
    +'<div style="font-size:9px;color:var(--muted)">'+pedidos.length+' pedido(s)</div>'
    +'</div></div>'

    // Barra de uso
    +'<div style="margin-bottom:14px;">'
    +'<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--sub);margin-bottom:4px;">'
    +'<span>Utilização do lote</span><span>'+pct+'% usado</span></div>'
    +'<div class="pbar" style="height:10px;">'
    +'<div class="pbar-fill" style="width:'+pct+'%;background:'+(pct>=90?'var(--red)':pct>=70?'var(--yellow)':'var(--green)')+';"></div>'
    +'</div></div>'

    // Fornecedor info
    +'<div style="margin-bottom:12px;padding:8px 12px;background:#0d1320;border-radius:8px;font-size:11px;">'
    +'<span style="color:var(--muted);">Fornecedor: </span><strong style="color:var(--text);">'+(forn?forn.nome:'Não informado')+'</strong>'
    +' &nbsp;|&nbsp; <span style="color:var(--muted);">Entrada: </span><strong style="color:var(--text);">'+fmtDate(e.data)+'</strong>'
    +' &nbsp;|&nbsp; <span style="color:var(--muted);">Peso/un: </span><strong style="color:var(--text);">'+(e.peso_unitario||1)+' kg</strong>'
    +'</div>'

    // Pedidos table
    +'<div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px;">📋 Pedidos vinculados ('+pedidos.length+')</div>'
    +'<div class="tbl-wrap" style="max-height:220px;overflow-y:auto;">'
    +'<table class="tbl"><thead><tr>'
    +'<th>Cliente</th><th>Fruta</th><th>Qtd</th><th>Unit.</th><th>Total</th><th>Data Ped.</th><th>Entrega</th><th>Status</th>'
    +'</tr></thead><tbody>'+pedRows+'</tbody></table>'
    +'</div>'
  );
}



// ═══════════════════════════════════════════════════════
// FILTROS DE PEDIDOS
// ═══════════════════════════════════════════════════════
function getPedidosFiltrados() {
  var busca = (document.getElementById('ped-search')||{}).value || '';
  var dtIni = (document.getElementById('ped-f-ini')||{}).value || '';
  var dtFim = (document.getElementById('ped-f-fim')||{}).value || '';
  var dtEnt = (document.getElementById('ped-f-ent')||{}).value || '';
  var status = (document.getElementById('ped-f-status')||{}).value || '';
  return DB.pedidos.filter(function(p) {
    if(busca && p.cliente_nome.toLowerCase().indexOf(busca.toLowerCase()) === -1) return false;
    if(dtIni && p.data_pedido < dtIni) return false;
    if(dtFim && p.data_pedido > dtFim) return false;
    if(dtEnt && p.data_entrega !== dtEnt) return false;
    if(status && p.status !== status) return false;
    return true;
  });
}

function renderPedidosFiltrado() {
  var filtrados = getPedidosFiltrados();
  var el = document.getElementById('ped-count');
  if(el) el.textContent = filtrados.length+'/'+DB.pedidos.length;
  var tbody = document.getElementById('ped-tabela');
  if(!tbody) return;
  // Remove thead from tbody before replacing
  var rows = filtrados.map(function(p) {
    var atrasado = p.data_entrega < today() && p.status === 'Pendente';
    return '<tr data-nome="'+p.cliente_nome.toLowerCase()+'">'
      +'<td style="color:var(--text);font-weight:600">'+p.cliente_nome+'</td>'
      +'<td>'+p.fruta+'</td>'
      +'<td>'+p.quantidade+' cx</td>'
      +'<td><strong style="color:var(--accent)">'+(p.quantidade_kg||0).toFixed(0)+' kg</strong></td>'
      +'<td>'+fmtMoney((p.valor||0)*p.quantidade)+'</td>'
      +'<td style="color:'+(atrasado?'var(--red)':'')+'">'+fmtDate(p.data_entrega)+(atrasado?' ⚠️':'')+'</td>'
      +'<td><span class="badge '+(p.status==='Atendido'?'bg':p.status==='Pendente'?'by':'bo')+'">'+p.status+'</span></td>'
      +'<td style="display:flex;gap:4px;flex-wrap:wrap;">'
      +(p.status==='Pendente'?'<button class="btn btn-g btn-sm" data-pid="'+p.id+'" onclick="modalAtenderPedido(this.dataset.pid)">✓ Atender</button>':'')
      +'<button class="btn btn-s btn-sm" data-pid="'+p.id+'" onclick="modalEditarPedido(this.dataset.pid)" title="Editar">✏️</button>'
      +'<button class="btn btn-s btn-sm" data-pid="'+p.id+'" onclick="imprimirPedido(this.dataset.pid)" title="Imprimir">🖨️</button>'
      +'<button class="btn btn-r btn-sm" data-pid="'+p.id+'" onclick="delPedido(this.dataset.pid)"><i data-lucide="trash-2" style="width:11px;height:11px;"></i></button>'
      +'</td></tr>';
  }).join('');
  // Find the tbody element and replace its innerHTML (only the rows, not the thead)
  var tbl = document.getElementById('ped-tabela');
  if(tbl) {
    var thead = tbl.querySelector('thead');
    tbl.innerHTML = '';
    if(thead) tbl.appendChild(thead);
    tbl.innerHTML += rows || '<tr><td colspan="8" class="empty">Nenhum pedido encontrado</td></tr>';
    lucide.createIcons();
  }
}

function limparFiltrosPedidos() {
  var ids = ['ped-search','ped-f-ini','ped-f-fim','ped-f-ent'];
  ids.forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  var sel = document.getElementById('ped-f-status');
  if(sel) sel.value = '';
  renderPedidosFiltrado();
}

function imprimirPedidosFiltrados() {
  var filtrados = getPedidosFiltrados();
  var totalCx = filtrados.reduce(function(s,p){return s+p.quantidade;},0);
  var totalKg = filtrados.reduce(function(s,p){return s+(p.quantidade_kg||0);},0);
  var totalVal = filtrados.reduce(function(s,p){return s+(p.valor||0)*p.quantidade;},0);
  var rows = filtrados.map(function(p){
    return '<tr><td>'+p.cliente_nome+'</td><td>'+p.fruta+'</td>'
      +'<td>'+p.quantidade+' cx</td><td>'+(p.quantidade_kg||0).toFixed(0)+' kg</td>'
      +'<td>R$ '+((p.valor||0).toFixed(2))+'</td><td>R$ '+((p.valor||0)*p.quantidade).toFixed(2)+'</td>'
      +'<td>'+fmtDate(p.data_pedido)+'</td><td>'+fmtDate(p.data_entrega)+'</td>'
      +'<td><span style="background:'+(p.status==='Atendido'?'#d1fae5':'#fef3c7')+';color:'+(p.status==='Atendido'?'#065f46':'#92400e')+';padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;">'+p.status+'</span></td>'
      +'</tr>';
  }).join('') || '<tr><td colspan="9" style="text-align:center;padding:12px;color:#999;">Nenhum pedido</td></tr>';
  var html = '<div class="pt">📋 Relatório de Pedidos</div>'
    +'<div class="sec"><h3>Resumo</h3><div class="row">'
    +'<div class="fld"><div class="lbl">Total Pedidos</div><div class="val" style="font-size:18px;">'+filtrados.length+'</div></div>'
    +'<div class="fld"><div class="lbl">Total Caixas</div><div class="val" style="font-size:18px;">'+totalCx+' cx</div></div>'
    +'<div class="fld"><div class="lbl">Total KG</div><div class="val" style="font-size:18px;color:#f97316;">'+totalKg.toFixed(0)+' kg</div></div>'
    +'<div class="fld"><div class="lbl">Valor Total</div><div class="val" style="font-size:18px;color:#10b981;">R$ '+totalVal.toFixed(2)+'</div></div>'
    +'</div></div>'
    +'<div class="sec"><h3>Pedidos</h3>'
    +'<table><tr><th>Cliente</th><th>Fruta</th><th>Qtd</th><th>Peso</th><th>Vl.Unit</th><th>Total</th><th>Data Pedido</th><th>Entrega</th><th>Status</th></tr>'
    +rows+'</table></div>';
  abrirJanelaImpressao('Relatório de Pedidos', html);
}

function imprimirRelatorioProducao() {
  var pendentes = DB.pedidos.filter(function(p){return p.status==='Pendente';});
  if(pendentes.length === 0) { toast('Nenhum pedido pendente!','warn'); return; }
  pendentes.sort(function(a,b){return a.data_entrega.localeCompare(b.data_entrega);});
  var totalCx = pendentes.reduce(function(s,p){return s+p.quantidade;},0);
  var totalKg = pendentes.reduce(function(s,p){return s+(p.quantidade_kg||0);},0);

  // Group by fruta
  var byFruta = {};
  pendentes.forEach(function(p){
    if(!byFruta[p.fruta]) byFruta[p.fruta] = {cx:0,kg:0,pedidos:[]};
    byFruta[p.fruta].cx += p.quantidade;
    byFruta[p.fruta].kg += p.quantidade_kg||0;
    byFruta[p.fruta].pedidos.push(p);
  });

  var resumoFruta = Object.keys(byFruta).map(function(f){
    return '<tr><td style="font-weight:700">'+f+'</td><td>'+byFruta[f].cx+' cx</td><td style="color:#f97316;font-weight:700">'+byFruta[f].kg.toFixed(0)+' kg</td><td>'+byFruta[f].pedidos.length+' pedido(s)</td></tr>';
  }).join('');

  var rows = pendentes.map(function(p, i){
    var atrasado = p.data_entrega < today();
    return '<tr style="'+(atrasado?'background:#fff5f5;':i%2===0?'':'background:#f9f9f9;')+'">'
      +'<td style="font-weight:700;color:'+(atrasado?'#ef4444':'#111')+';">'+(i+1)+'</td>'
      +'<td style="font-weight:700">'+p.cliente_nome+'</td>'
      +'<td style="font-weight:700;color:#f97316;">'+p.fruta+'</td>'
      +'<td style="text-align:center;">'+p.quantidade+' cx</td>'
      +'<td style="text-align:center;font-weight:700;color:#f97316;">'+(p.quantidade_kg||0).toFixed(0)+' kg</td>'
      +'<td>'+p.mercadoria_nome+'</td>'
      +'<td>'+p.bancas+'</td>'
      +'<td style="color:'+(atrasado?'#ef4444':'#111')+';font-weight:'+(atrasado?'700':'400')+';">'
      +fmtDate(p.data_entrega)+(atrasado?' ⚠️ ATRASADO':'')+'</td>'
      +'<td>'+(p.obs||'-')+'</td>'
      +'</tr>';
  }).join('');

  var html = '<div class="pt">🏭 Relatório de Produção — Pedidos Pendentes</div>'
    +'<div style="background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:10px;margin-bottom:14px;font-size:12px;">'
    +'<strong>Data/hora:</strong> '+new Date().toLocaleString('pt-BR')
    +' &nbsp;|&nbsp; <strong>'+pendentes.length+' pedidos pendentes</strong>'
    +' &nbsp;|&nbsp; <strong>'+totalCx+' caixas</strong>'
    +' &nbsp;|&nbsp; <strong style="color:#f97316;">'+totalKg.toFixed(0)+' kg</strong>'
    +'</div>'
    +'<div class="sec"><h3>Resumo por Fruta</h3>'
    +'<table><tr><th>Fruta</th><th>Total Caixas</th><th>Total KG</th><th>Pedidos</th></tr>'+resumoFruta+'</table></div>'
    +'<div class="sec"><h3>Pedidos a Produzir (ordenados por entrega)</h3>'
    +'<table><tr><th>#</th><th>Cliente</th><th>Fruta</th><th>Qtd</th><th>KG</th><th>Mercadoria</th><th>Bancas/Calibre</th><th>Entrega</th><th>Obs</th></tr>'
    +rows+'</table></div>'
    +'<div style="margin-top:20px;padding:10px;border:1px dashed #ccc;border-radius:6px;">'
    +'<strong>Conferência:</strong> ________ &nbsp;&nbsp;&nbsp; <strong>Responsável:</strong> ________________________ &nbsp;&nbsp;&nbsp; <strong>Assinatura:</strong> ________________________'
    +'</div>';
  abrirJanelaImpressao('Relatório de Produção', html);
}
